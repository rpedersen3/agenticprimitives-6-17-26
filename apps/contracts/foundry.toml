[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "account-abstraction/=lib/account-abstraction/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Deploy script writes deployments-<network>.json into this directory.
fs_permissions = [
    { access = "write", path = "./deployments-anvil.json" },
    { access = "write", path = "./deployments-base-sepolia.json" },
    { access = "read",  path = "./test/fixtures" },
]

[fuzz]
runs = 256
