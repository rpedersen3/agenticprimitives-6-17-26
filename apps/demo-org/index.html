<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Org</title>
    <style>
      /* ── Design tokens ─────────────────────────────────────────────── */
      :root {
        --c-primary: #4338ca; --c-primary-hover: #3730a3; --c-primary-active: #312e81;
        --c-primary-subtle: #eef2ff; --c-primary-border: #c7d2fe;
        --c-primary-mid: #818cf8; --c-primary-light: #6366f1;
        --c-g900: #0f172a; --c-g700: #334155; --c-g500: #64748b; --c-g400: #94a3b8;
        --c-g300: #cbd5e1; --c-g200: #e2e8f0; --c-g100: #f1f5f9; --c-g50: #f8fafc;
        --c-success: #059669; --c-success-bg: #ecfdf5; --c-success-border: #a7f3d0;
        --c-danger: #dc2626; --c-danger-bg: #fef2f2; --c-danger-border: #fecaca;
        --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 20px; --r-2xl: 24px;
        --sh-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
        --sh-md: 0 4px 14px rgba(15,23,42,.09), 0 2px 6px rgba(15,23,42,.05);
        --sh-card: 0 2px 16px rgba(67,56,202,.10), 0 1px 4px rgba(15,23,42,.06);
        --sh-primary: 0 4px 16px rgba(67,56,202,.35), 0 2px 6px rgba(67,56,202,.20);
        --sh-modal: 0 24px 60px rgba(15,23,42,.22), 0 8px 24px rgba(15,23,42,.10);
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-back: cubic-bezier(0.34, 1.56, 0.64, 1);
        --app-max: 430px;
        --app-px: 20px;
        /* Hero gradient — blue-to-indigo radial wash */
        --grad-hero: radial-gradient(ellipse at 50% 110%, rgba(99,102,241,.22) 0%, rgba(79,70,229,.12) 35%, rgba(139,92,246,.07) 60%, transparent 78%);
        --grad-shield: linear-gradient(145deg, #6366f1 0%, #4338ca 50%, #3730a3 100%);
        --grad-shield-glow: 0 8px 40px rgba(99,102,241,.45), 0 2px 12px rgba(67,56,202,.30);
      }

      /* ── Reset & base ──────────────────────────────────────────────── */
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: #fff;
        color: var(--c-g700);
        margin: 0; padding: 0;
        min-height: 100dvh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      /* ── App shell ─────────────────────────────────────────────────── */
      #root { display: flex; flex-direction: column; min-height: 100dvh; }
      .app-shell {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: var(--app-max);
        width: 100%;
        margin: 0 auto;
        padding: 0 var(--app-px);
      }

      /* ── Typography ────────────────────────────────────────────────── */
      h1 {
        font-size: 1.875rem;
        font-weight: 800;
        color: var(--c-g900);
        letter-spacing: -0.04em;
        margin: 0 0 .5rem;
        line-height: 1.15;
      }
      h2 {
        font-size: 1.0625rem;
        font-weight: 700;
        color: var(--c-g900);
        letter-spacing: -0.02em;
        margin: 0 0 .5rem;
        line-height: 1.3;
      }
      h3 {
        font-size: .75rem;
        font-weight: 700;
        color: var(--c-g400);
        text-transform: uppercase;
        letter-spacing: .08em;
        margin: 0 0 .75rem;
      }
      p { margin: 0 0 .6rem; }
      a { color: var(--c-primary); }
      .muted { color: var(--c-g500); font-size: .875rem; }
      .ok { color: var(--c-success); }
      .err { color: var(--c-danger); }
      .accent { color: var(--c-primary-light); }
      code {
        background: var(--c-g100);
        color: var(--c-g700);
        padding: .1rem .35rem;
        border-radius: 5px;
        font-size: .85em;
      }

      /* ── Focus ring ────────────────────────────────────────────────── */
      *:focus-visible {
        outline: 2.5px solid var(--c-primary-light);
        outline-offset: 2px;
        border-radius: var(--r-sm);
      }

      /* ── Buttons ───────────────────────────────────────────────────── */
      button {
        font: inherit;
        font-weight: 600;
        font-size: .9375rem;
        padding: .7rem 1.25rem;
        min-height: 48px;
        cursor: pointer;
        border: 1.5px solid transparent;
        border-radius: var(--r-md);
        background: var(--c-primary);
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: .5rem;
        transition: background 0.18s var(--ease), box-shadow 0.18s var(--ease), transform 0.12s var(--ease), opacity .15s;
        white-space: nowrap;
        letter-spacing: -.01em;
      }
      button:hover:not(:disabled) {
        background: var(--c-primary-hover);
        transform: translateY(-1px);
      }
      button:active:not(:disabled) {
        background: var(--c-primary-active);
        transform: translateY(0);
      }
      button:disabled { opacity: .42; cursor: default; }

      /* Full-width primary CTA */
      button.cta {
        width: 100%;
        font-size: 1rem;
        font-weight: 700;
        padding: .9rem 1.5rem;
        min-height: 56px;
        border-radius: var(--r-xl);
        background: var(--grad-shield);
        box-shadow: var(--sh-primary);
        letter-spacing: -.02em;
      }
      button.cta:not(:disabled):hover {
        box-shadow: 0 6px 24px rgba(67,56,202,.45), 0 2px 8px rgba(67,56,202,.24);
        transform: translateY(-1px);
      }
      button.cta:active:not(:disabled) {
        transform: translateY(0);
        box-shadow: var(--sh-primary);
      }

      /* Ghost / outline */
      button.ghost {
        background: #fff;
        color: var(--c-g700);
        border-color: var(--c-g200);
        box-shadow: none;
      }
      button.ghost:hover:not(:disabled) {
        background: var(--c-g50);
        border-color: var(--c-g300);
        box-shadow: none;
        transform: translateY(-1px);
      }
      button.ghost:disabled { background: #fff; }

      /* Full-width ghost CTA */
      button.cta.ghost {
        background: #fff;
        color: var(--c-g700);
        border: 1.5px solid var(--c-g200);
        box-shadow: none;
        background: none;
        font-weight: 600;
      }
      button.cta.ghost:hover:not(:disabled) {
        background: var(--c-g50);
        border-color: var(--c-g300);
        box-shadow: none;
      }

      /* Danger ghost */
      button.ghost-danger {
        background: #fff;
        color: var(--c-danger);
        border-color: var(--c-danger-border);
        font-size: .875rem;
        padding: .5rem .875rem;
        min-height: 40px;
      }
      button.ghost-danger:hover:not(:disabled) { background: var(--c-danger-bg); }

      /* Small inline action (text-button) */
      button.inline {
        background: none;
        border: none;
        color: var(--c-primary);
        font-weight: 600;
        font-size: .875rem;
        padding: .25rem .25rem;
        min-height: 32px;
        cursor: pointer;
        border-radius: var(--r-sm);
        box-shadow: none;
      }
      button.inline:hover:not(:disabled) {
        text-decoration: underline;
        background: none;
        transform: none;
      }

      /* ── Text input ─────────────────────────────────────────────────── */
      input[type="text"],
      input:not([type]) {
        display: block;
        width: 100%;
        height: 52px;
        padding: 0 1rem;
        font: inherit;
        font-size: 1rem;
        color: var(--c-g900);
        background: #fff;
        border: 1.5px solid var(--c-g200);
        border-radius: var(--r-md);
        transition: border-color .15s, box-shadow .15s;
      }
      input:hover { border-color: var(--c-g300); }
      input:focus {
        outline: none;
        border-color: var(--c-primary-light);
        box-shadow: 0 0 0 3.5px rgba(99,102,241,.16);
      }

      .input-wrap { position: relative; }
      .input-wrap input { padding-right: 2.5rem; }
      .input-check {
        position: absolute;
        right: .875rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--c-success);
        font-size: 1.1rem;
        pointer-events: none;
      }

      /* ── Card / panel ───────────────────────────────────────────────── */
      .card {
        padding: 1.125rem 1.25rem;
        border: 1px solid var(--c-g200);
        border-radius: var(--r-xl);
        background: #fff;
        box-shadow: var(--sh-card);
        margin-bottom: 10px;
        transition: box-shadow 0.2s var(--ease);
      }
      .card-accent {
        border-color: var(--c-primary-border);
        background: linear-gradient(160deg, #fff 55%, var(--c-primary-subtle));
      }

      .card-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: .75rem;
        cursor: default;
      }
      .card-row-icon {
        width: 40px; height: 40px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 1.1rem;
      }
      .card-row-icon.blue   { background: #eff6ff; color: #3b82f6; }
      .card-row-icon.green  { background: var(--c-success-bg); color: var(--c-success); }
      .card-row-icon.purple { background: var(--c-primary-subtle); color: var(--c-primary); }
      .card-row-icon.amber  { background: #fffbeb; color: #d97706; }
      .card-row-meta { flex: 1; min-width: 0; }
      .card-row-label {
        font-weight: 700;
        font-size: .9375rem;
        color: var(--c-g900);
        line-height: 1.3;
        display: flex;
        align-items: center;
        gap: .4rem;
      }
      .card-row-sub { font-size: .78rem; color: var(--c-g400); margin-top: .1rem; }
      .card-chevron { color: var(--c-g300); font-size: .875rem; flex-shrink: 0; font-weight: 700; }

      /* ── Badge / pill ───────────────────────────────────────────────── */
      .badge {
        display: inline-flex;
        align-items: center;
        font-size: .68rem;
        font-weight: 700;
        letter-spacing: .04em;
        padding: .2rem .6rem;
        border-radius: 999px;
        background: var(--c-primary-subtle);
        color: var(--c-primary);
        border: 1px solid var(--c-primary-border);
        white-space: nowrap;
        text-transform: uppercase;
      }
      .badge.success {
        background: var(--c-success-bg);
        color: var(--c-success);
        border-color: var(--c-success-border);
      }
      .badge.soon {
        background: var(--c-g100);
        color: var(--c-g400);
        border-color: var(--c-g200);
        font-size: .62rem;
        letter-spacing: .05em;
        font-weight: 600;
      }

      /* ── Reward row ─────────────────────────────────────────────────── */
      /*
       * Ownership moment — the chips that appear after sign-in / org creation.
       * They should feel like earned certificates, not status labels.
       * On fresh connect they animate in with a gentle spring.
       */
      .reward-row {
        display: flex;
        flex-wrap: wrap;
        gap: .5rem;
        margin: .875rem 0 .25rem;
      }
      .reward-chip {
        display: inline-flex;
        align-items: center;
        gap: .375rem;
        padding: .35rem .875rem .35rem .5rem;
        border-radius: 999px;
        background: var(--c-success-bg);
        border: 1.5px solid var(--c-success-border);
        font-size: .78rem;
        font-weight: 700;
        color: var(--c-success);
        white-space: nowrap;
        animation: chip-in .5s var(--ease-back) both;
      }
      .reward-chip:nth-child(2) { animation-delay: .08s; }
      .reward-chip:nth-child(3) { animation-delay: .16s; }
      @keyframes chip-in {
        from { opacity: 0; transform: scale(.82) translateY(6px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      .reward-chip-icon {
        width: 20px; height: 20px;
        border-radius: 50%;
        background: var(--c-success);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: .6rem;
        flex-shrink: 0;
        font-weight: 800;
      }
      .reward-chip.primary {
        background: var(--c-primary-subtle);
        border-color: var(--c-primary-border);
        color: var(--c-primary);
      }
      .reward-chip.primary .reward-chip-icon { background: var(--c-primary); }

      /* ── Top bar ─────────────────────────────────────────────────────── */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 56px;
        background: rgba(255,255,255,.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--c-g100);
        position: sticky;
        top: 0;
        z-index: 30;
        padding: 0 var(--app-px);
      }
      .topbar-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        max-width: var(--app-max);
        margin: 0 auto;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: .5rem;
        font-size: .9375rem;
        font-weight: 800;
        color: var(--c-g900);
        letter-spacing: -0.02em;
      }
      .brand-shield { width: 30px; height: 30px; }
      .agent-pill {
        display: flex;
        align-items: center;
        gap: .4rem;
        font-size: .8125rem;
        font-weight: 700;
        color: var(--c-g700);
        cursor: pointer;
        padding: .3rem .7rem;
        border-radius: 999px;
        border: 1.5px solid var(--c-g200);
        background: var(--c-g50);
        min-height: 36px;
        user-select: none;
        transition: background .15s, border-color .15s;
      }
      .agent-pill:hover { background: var(--c-g100); border-color: var(--c-g300); }

      /* ── Dropdown menu ───────────────────────────────────────────────── */
      .menu { position: relative; }
      .menu-pop {
        position: absolute;
        right: 0;
        top: calc(100% + 6px);
        background: #fff;
        border: 1px solid var(--c-g200);
        border-radius: var(--r-lg);
        box-shadow: var(--sh-md);
        min-width: 220px;
        padding: .375rem;
        z-index: 40;
        animation: pop-down .18s var(--ease);
      }
      @keyframes pop-down {
        from { opacity: 0; transform: translateY(-6px) scale(.97); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
      .menu-pop button {
        display: flex;
        width: 100%;
        text-align: left;
        background: #fff;
        color: var(--c-g700);
        border: none;
        margin: 0;
        min-height: 44px;
        font-weight: 500;
        font-size: .875rem;
        border-radius: var(--r-sm);
        padding: .5rem .75rem;
        justify-content: flex-start;
        box-shadow: none;
        letter-spacing: 0;
        transform: none;
      }
      .menu-pop button:hover:not(:disabled) {
        background: var(--c-g50);
        transform: none;
        box-shadow: none;
      }
      .menu-sep { height: 1px; background: var(--c-g100); margin: .3rem .2rem; }
      .menu-meta {
        padding: .4rem .75rem .2rem;
        font-size: .78rem;
        color: var(--c-g500);
      }

      /* ════════════════════════════════════════════════════════════════
         HERO / SIGNED-OUT VIEW
         Layout goal: everything fits 360×584 (100dvh - 56px topbar)
         without scrolling. Primary CTA must be visible.

         Strategy:
         • Compact top padding
         • Large h1 with indigo accent on key word
         • Value list with illustrated icon chips
         • Shield illustration: present on ≥580px height, hidden below
         • Two form sections collapsed into a compact vertical flow
         • Privacy footer pinned near the bottom
         ════════════════════════════════════════════════════════════════ */
      .hero-screen {
        display: flex;
        flex-direction: column;
        min-height: calc(100dvh - 56px);
        background: #fff;
        position: relative;
        overflow: hidden;
      }
      /* Blue radial bloom from bottom */
      .hero-screen::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: -80px;
        transform: translateX(-50%);
        width: 640px; height: 480px;
        background: var(--grad-hero);
        pointer-events: none;
        z-index: 0;
      }
      .hero-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: var(--app-max);
        width: 100%;
        margin: 0 auto;
        padding: 0 var(--app-px);
        position: relative;
        z-index: 1;
      }

      /* Hero top: headline + value bullets */
      .hero-top {
        padding-top: 1.625rem;
        padding-bottom: .875rem;
      }
      .hero-top h1 {
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: -0.04em;
        line-height: 1.12;
        margin-bottom: .75rem;
      }

      /* Value-list with tinted icon chips */
      .value-list {
        list-style: none;
        padding: 0; margin: 0 0 .875rem;
        display: flex;
        flex-direction: column;
        gap: .5rem;
      }
      .value-list li {
        display: flex;
        align-items: center;
        gap: .625rem;
        font-size: .9rem;
        color: var(--c-g700);
        line-height: 1.4;
      }
      .vi-chip {
        width: 30px; height: 30px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: .8rem;
      }
      .vi-chip.blue   { background: #dbeafe; color: #2563eb; }
      .vi-chip.green  { background: #dcfce7; color: #059669; }
      .vi-chip.purple { background: #ede9fe; color: var(--c-primary); }

      /* ── Shield hero illustration ───────────────────────────────────── */
      /*
       * The shield is the centrepiece of the brand. On the hero screen it's
       * a large gradient-filled SVG with a subtle halo glow, surrounded by
       * small floating icon chips. On short viewports (≤580px) we drop it
       * to keep the CTAs accessible without scrolling.
       */
      .shield-hero {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: .625rem 0 .5rem;
        position: relative;
      }
      .shield-svg-wrap {
        position: relative;
        width: 120px; height: 136px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      @keyframes float1 {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-5px); }
      }
      @keyframes float2 {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(4px); }
      }

      /* ── Short viewport squeeze ──────────────────────────────────────── */
      @media (max-height: 700px) {
        .hero-top { padding-top: .875rem; padding-bottom: .625rem; }
        .hero-top h1 { font-size: 1.625rem; margin-bottom: .5rem; }
        .value-list { gap: .375rem; margin-bottom: .625rem; }
        .value-list li { font-size: .84rem; }
        .vi-chip { width: 26px; height: 26px; font-size: .72rem; }
        .shield-hero { padding: .375rem 0 .25rem; }
        .shield-svg-wrap { width: 96px; height: 110px; }
        .shield-float { display: none; }
      }
      @media (max-height: 580px) {
        .shield-hero { display: none; }
      }

      /* ── Form sections ───────────────────────────────────────────────── */
      .form-section { margin-bottom: 20px; }
      .form-section label {
        display: block;
        font-size: .8125rem;
        font-weight: 700;
        color: var(--c-g500);
        text-transform: uppercase;
        letter-spacing: .06em;
        margin-bottom: .4rem;
      }
      .field-hint {
        margin-top: .4rem;
        font-size: .8375rem;
        display: flex;
        align-items: center;
        gap: .35rem;
        min-height: 1.25rem;
      }
      .field-hint.checking  { color: var(--c-g400); }
      .field-hint.available { color: var(--c-success); font-weight: 700; }
      .field-hint.taken     { color: var(--c-danger); }
      .field-hint.found     { color: var(--c-success); font-weight: 700; }
      .field-hint.none      { color: var(--c-g400); }

      /* ── Divider ─────────────────────────────────────────────────────── */
      .divider {
        display: flex;
        align-items: center;
        gap: .75rem;
        margin: 1rem 0;
        color: var(--c-g300);
        font-size: .75rem;
        font-weight: 700;
        letter-spacing: .06em;
        text-transform: uppercase;
      }
      .divider::before, .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--c-g100);
      }

      /* ── Connect actions ─────────────────────────────────────────────── */
      .connect-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: .875rem;
      }

      /* Privacy footer */
      .privacy-footer {
        padding: .625rem 0 max(1.25rem, env(safe-area-inset-bottom, 1.25rem));
        text-align: center;
        font-size: .75rem;
        color: var(--c-g400);
        letter-spacing: .01em;
      }

      /* Inline error */
      .inline-err {
        font-size: .8375rem;
        color: var(--c-danger);
        margin-top: .4rem;
        display: flex;
        align-items: flex-start;
        gap: .3rem;
      }

      /* ════════════════════════════════════════════════════════════════
         DASHBOARD (signed-in)
         The "secure home" — a personal control centre that should feel
         premium, not like a developer console.
         ════════════════════════════════════════════════════════════════ */
      .dashboard {
        flex: 1;
        padding-bottom: calc(68px + max(1rem, env(safe-area-inset-bottom, 1rem)));
        padding-top: 0;
      }

      /* Dashboard page header — agent name as H1 */
      .dash-header {
        padding: 1.125rem 0 .875rem;
      }
      .dash-header h1 {
        font-size: 1.625rem;
        font-weight: 900;
        letter-spacing: -0.03em;
        margin: 0;
        line-height: 1.2;
      }
      .dash-sub {
        font-size: .78rem;
        color: var(--c-g400);
        margin-top: .2rem;
        display: flex;
        align-items: center;
        gap: .375rem;
      }
      /* Live network dot */
      .dash-sub::before {
        content: '';
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--c-success);
        display: inline-block;
        flex-shrink: 0;
      }

      /* ── Smart Agent ID card ─────────────────────────────────────────── */
      /*
       * The hero "what you got" card shown on first arrival (session.fresh).
       * Styled as a solid ID card — name large, address copyable, owned-by note.
       * Replaces the header + reward chips pattern for the fresh state.
       * The substance IS the design: no extra decoration needed.
       */
      .agent-id-card {
        background: linear-gradient(160deg, var(--c-primary-subtle) 0%, #fff 60%);
        border: 1.5px solid var(--c-primary-border);
        border-radius: var(--r-xl);
        padding: 1.125rem 1.25rem 1rem;
        margin-bottom: 10px;
        box-shadow: 0 4px 20px rgba(67,56,202,.13), 0 1px 6px rgba(15,23,42,.06);
        animation: pop .28s var(--ease);
      }
      .agent-id-eyebrow {
        display: flex;
        align-items: center;
        gap: .375rem;
        font-size: .68rem;
        font-weight: 800;
        color: var(--c-primary);
        text-transform: uppercase;
        letter-spacing: .08em;
        margin-bottom: .4rem;
      }
      .agent-id-name {
        font-size: 1.5rem;
        font-weight: 900;
        color: var(--c-g900);
        letter-spacing: -0.04em;
        line-height: 1.18;
        word-break: break-all;
      }
      .agent-id-owned {
        display: flex;
        align-items: center;
        gap: .35rem;
        font-size: .76rem;
        color: var(--c-g500);
        margin-top: .5rem;
      }
      .agent-id-owned-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--c-success);
        flex-shrink: 0;
      }
      .agent-id-orgs {
        display: flex;
        flex-wrap: wrap;
        gap: .375rem;
        margin-top: .625rem;
      }
      .agent-id-org-chip {
        display: inline-flex;
        align-items: center;
        gap: .3rem;
        font-size: .75rem;
        font-weight: 700;
        color: var(--c-g700);
        background: #fff;
        border: 1px solid var(--c-g200);
        border-radius: 999px;
        padding: .2rem .625rem;
        white-space: nowrap;
      }

      /* Address chip */
      .addr-chip {
        display: inline-flex;
        align-items: center;
        gap: .4rem;
        font-family: 'SF Mono', 'Roboto Mono', monospace;
        font-size: .76rem;
        color: var(--c-g400);
        background: var(--c-g50);
        border: 1px solid var(--c-g100);
        border-radius: var(--r-sm);
        padding: .2rem .5rem;
        margin-top: .3rem;
        cursor: pointer;
        transition: background .12s, color .12s;
        letter-spacing: .01em;
      }
      .addr-chip:hover { background: var(--c-g100); color: var(--c-g700); }
      .addr-chip-copy { color: var(--c-g300); font-size: .7rem; }

      /* Section header */
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: .75rem;
      }

      /* PII mask placeholder */
      .pii-mask {
        display: flex;
        align-items: center;
        gap: .625rem;
        padding: .5rem 0;
        font-size: .9375rem;
        color: var(--c-g300);
        letter-spacing: .08em;
        user-select: none;
      }
      .pii-icon {
        width: 28px; height: 28px;
        border-radius: 8px;
        background: var(--c-g100);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: .8rem;
        flex-shrink: 0;
        color: var(--c-g400);
      }

      /* PII record table */
      .record-table { width: 100%; border-collapse: collapse; margin-bottom: .5rem; }
      .record-table td {
        padding: .4rem 0;
        vertical-align: top;
        font-size: .9375rem;
        border-bottom: 1px solid var(--c-g100);
      }
      .record-table tr:last-child td { border-bottom: none; }
      .record-table .rec-key {
        font-weight: 700;
        color: var(--c-g400);
        font-size: .72rem;
        text-transform: uppercase;
        letter-spacing: .06em;
        width: 38%;
        padding-right: .75rem;
        padding-top: .55rem;
      }
      .record-table .rec-val { color: var(--c-g900); word-break: break-all; }

      /* Sensitive data block */
      .sensitive-block {
        margin-top: .75rem;
        padding: 1rem;
        background: var(--c-g50);
        border: 1px solid var(--c-g100);
        border-radius: var(--r-lg);
      }
      .sensitive-block.revealed {
        background: var(--c-success-bg);
        border-color: var(--c-success-border);
        animation: reveal-in .35s var(--ease);
      }
      @keyframes reveal-in {
        from { opacity: 0; transform: scale(.98); }
        to   { opacity: 1; transform: scale(1); }
      }
      .sensitive-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: .5rem;
      }
      .sensitive-label {
        font-size: .72rem;
        font-weight: 700;
        color: var(--c-g400);
        text-transform: uppercase;
        letter-spacing: .07em;
        display: flex;
        align-items: center;
        gap: .35rem;
      }
      .lock-icon { font-size: .875rem; }

      /* Shared-with note */
      .shared-note {
        display: flex;
        align-items: center;
        gap: .375rem;
        margin-top: .625rem;
        font-size: .76rem;
        color: var(--c-g400);
      }
      .shared-note-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--c-success);
        flex-shrink: 0;
      }

      /* Org item */
      .org-item {
        border-top: 1px solid var(--c-g100);
        padding: .875rem 0;
      }
      .org-item:first-child { border-top: none; padding-top: 0; }
      .org-item:last-child  { padding-bottom: 0; }
      .org-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: .75rem;
      }
      .org-meta { flex: 1; min-width: 0; }
      .org-name {
        font-weight: 700;
        color: var(--c-g900);
        font-size: .9375rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .org-addr {
        font-size: .75rem;
        color: var(--c-g400);
        margin-top: .1rem;
        font-family: 'SF Mono', 'Roboto Mono', monospace;
      }

      /* ── Bottom tab bar ──────────────────────────────────────────────── */
      .tab-bar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(255,255,255,.96);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-top: 1px solid var(--c-g100);
        display: flex;
        align-items: stretch;
        justify-content: center;
        z-index: 20;
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      .tab-bar-inner {
        display: flex;
        width: 100%;
        max-width: var(--app-max);
      }
      .tab-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: .5rem .25rem .625rem;
        gap: .2rem;
        background: none;
        border: none;
        min-height: 56px;
        cursor: pointer;
        color: var(--c-g400);
        font-size: .62rem;
        font-weight: 700;
        letter-spacing: .04em;
        text-transform: uppercase;
        border-radius: 0;
        box-shadow: none;
        position: relative;
        transition: color .15s;
        transform: none;
      }
      .tab-item:hover:not(:disabled) { background: none; color: var(--c-g500); transform: none; }
      .tab-item.active { color: var(--c-primary); }
      /* Active tab indicator line */
      .tab-item.active::before {
        content: '';
        position: absolute;
        top: 0; left: 25%; right: 25%;
        height: 2px;
        background: var(--c-primary);
        border-radius: 0 0 2px 2px;
      }
      .tab-item .tab-icon { font-size: 1.1rem; line-height: 1; }
      .tab-soon {
        position: absolute;
        top: .35rem;
        right: calc(50% - 14px);
        background: var(--c-g100);
        color: var(--c-g400);
        font-size: .5rem;
        font-weight: 800;
        letter-spacing: .06em;
        padding: .05rem .25rem;
        border-radius: 3px;
        line-height: 1.4;
        pointer-events: none;
        text-transform: uppercase;
      }

      /* ── Progress modal / bottom sheet ──────────────────────────────── */
      .modal-backdrop {
        position: fixed; inset: 0;
        background: rgba(15,23,42,.6);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        z-index: 50;
        padding: 0;
        animation: fade .2s var(--ease);
      }
      .modal {
        background: #fff;
        border-radius: var(--r-2xl) var(--r-2xl) 0 0;
        padding: 1.5rem var(--app-px) max(1.75rem, env(safe-area-inset-bottom, 1.75rem));
        width: 100%;
        max-width: var(--app-max);
        box-shadow: var(--sh-modal);
        animation: sheet .32s var(--ease);
      }
      /* Drag handle pill */
      .modal::before {
        content: '';
        display: block;
        width: 36px; height: 4px;
        background: var(--c-g200);
        border-radius: 2px;
        margin: 0 auto .875rem;
      }
      .modal h2 { margin: 0 0 .75rem; }

      /* Progress dot indicator */
      .step-indicator {
        display: inline-flex;
        align-items: center;
        gap: .35rem;
        font-size: .72rem;
        font-weight: 700;
        color: var(--c-primary);
        background: var(--c-primary-subtle);
        border: 1px solid var(--c-primary-border);
        border-radius: 999px;
        padding: .2rem .6rem;
        margin-bottom: .75rem;
        letter-spacing: .02em;
        text-transform: uppercase;
      }
      .step-dots { display: flex; gap: .3rem; align-items: center; }
      .step-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--c-primary-border);
        transition: background .2s;
      }
      .step-dot.active { background: var(--c-primary); }

      /* Steps checklist */
      .steps { list-style: none; padding: 0; margin: .5rem 0 1rem; }
      .steps li {
        padding: .4rem 0;
        display: flex;
        align-items: flex-start;
        gap: .625rem;
        font-size: .9375rem;
        line-height: 1.4;
      }
      .steps li.pending { color: var(--c-g300); }
      .steps li.done    { color: var(--c-success); }
      .steps li.current { color: var(--c-g900); font-weight: 700; }
      .steps .step-icon { flex-shrink: 0; margin-top: .1em; width: 1.1em; text-align: center; }

      /* Spinners */
      .spinner {
        width: 1rem; height: 1rem;
        border: 2px solid var(--c-g200);
        border-top-color: var(--c-primary);
        border-radius: 50%;
        display: inline-block;
        animation: spin .65s linear infinite;
        flex-shrink: 0;
      }
      .spinner-lg {
        width: 2rem; height: 2rem;
        border-width: 3px;
      }

      /* ── Keyframes ───────────────────────────────────────────────────── */
      @keyframes spin    { to { transform: rotate(360deg); } }
      @keyframes fade    { from { opacity: 0; } }
      @keyframes sheet   { from { opacity: 0; transform: translateY(48px); } }
      @keyframes pop     { from { opacity: 0; transform: translateY(8px) scale(.97); } }

      /* ── Reduced motion ──────────────────────────────────────────────── */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: .01ms !important;
          transition-duration: .01ms !important;
        }
      }

      /* ── Desktop overrides ───────────────────────────────────────────── */
      @media (min-width: 600px) {
        .modal-backdrop { align-items: center; padding: 1rem; }
        .modal {
          border-radius: var(--r-2xl);
          animation: pop .28s var(--ease);
          padding: 1.75rem 2rem;
          max-width: min(30rem, 94vw);
        }
        .modal::before { display: none; }
        .topbar { padding: 0 1.5rem; }
        .app-shell { padding: 0; }
        .hero-screen::after { width: 760px; height: 560px; }
        .tab-bar { padding-bottom: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
