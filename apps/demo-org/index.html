<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Org — relying-site demo</title>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; max-width: 920px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; color: #1a1a2e; }
      h1 { font-size: 1.5rem; } h2 { font-size: 1.1rem; }
      .topbar { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e0e0ea; padding-bottom: 0.7rem; margin-bottom: 1rem; }
      .topbar .brand { font-size: 1.25rem; font-weight: 700; color: #5b5bd6; }
      .menu { position: relative; }
      .menu-btn { font-weight: 600; }
      .menu-pop { position: absolute; right: 0; top: 110%; background: #fff; border: 1px solid #e0e0ea; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); min-width: 12rem; padding: 0.3rem; z-index: 40; }
      .menu-pop button { display: block; width: 100%; text-align: left; border: none; margin: 0; border-radius: 6px; }
      button { padding: 0.45rem 0.9rem; margin: 0.2rem 0.4rem 0.2rem 0; cursor: pointer; border: 1px solid #c7c7d9; border-radius: 6px; background: #fff; }
      button:hover { background: #f3f3fb; } button:disabled { opacity: 0.5; cursor: default; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      .panel { padding: 1rem; border: 1px solid #e0e0ea; border-radius: 8px; background: #fbfbfe; }
      .broker { border-color: #5b5bd6; background: #f4f4ff; }
      pre { background: #f5f5f7; padding: 0.6rem; border-radius: 4px; overflow-x: auto; font-size: 0.78rem; }
      .ok { color: #0a7d0a; } .err { color: #b00020; } .muted { color: #666; font-size: 0.88rem; }
      code { background: #eee; padding: 0 0.2rem; border-radius: 3px; }
      .badge { display: inline-block; font-size: 0.72rem; padding: 0.1rem 0.4rem; border-radius: 10px; background: #e8e8f5; }
      .modal-backdrop { position: fixed; inset: 0; background: rgba(26,26,46,0.45); display: flex; align-items: center; justify-content: center; z-index: 50; }
      .modal { background: #fff; border-radius: 12px; padding: 1.4rem 1.6rem; width: min(28rem, 92vw); box-shadow: 0 12px 40px rgba(0,0,0,0.25); }
      .modal h2 { margin-top: 0; }
      .steps { list-style: none; padding: 0; margin: 0.6rem 0; }
      .steps li { padding: 0.3rem 0; display: flex; align-items: center; gap: 0.5rem; }
      .steps li.pending { color: #999; } .steps li.done { color: #0a7d0a; } .steps li.current { color: #1a1a2e; font-weight: 500; }
      .spinner { width: 1rem; height: 1rem; border: 2px solid #c7c7d9; border-top-color: #5b5bd6; border-radius: 50%; display: inline-block; animation: spin 0.7s linear infinite; flex: 0 0 auto; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
