<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Org — relying-site demo</title>
    <style>
      :root {
        --c-primary: #4f46e5; --c-primary-hover: #4338ca; --c-primary-active: #3730a3;
        --c-primary-subtle: #f5f3ff; --c-primary-border: #c7d2fe;
        --c-g900: #111827; --c-g700: #374151; --c-g500: #6b7280; --c-g400: #9ca3af;
        --c-g300: #d1d5db; --c-g200: #e5e7eb; --c-g100: #f3f4f6; --c-g50: #f9fafb;
        --c-success: #16a34a; --c-success-bg: #f0fdf4; --c-success-border: #bbf7d0;
        --c-danger: #dc2626; --c-danger-bg: #fef2f2; --c-danger-border: #fecaca;
        --r-sm: 8px; --r-md: 12px; --r-lg: 16px;
        --sh-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
        --sh-md: 0 4px 14px rgba(17,24,39,.08), 0 2px 6px rgba(17,24,39,.05);
        --sh-modal: 0 24px 60px rgba(17,24,39,.20), 0 6px 18px rgba(17,24,39,.10);
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
      }
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        max-width: 680px; margin: 2.5rem auto; padding: 0 1.25rem; line-height: 1.6;
        color: var(--c-g700); background: var(--c-g50);
        -webkit-font-smoothing: antialiased;
      }
      h1 { font-size: 1.5rem; font-weight: 700; color: var(--c-g900); letter-spacing: -0.01em; margin: 0 0 .25rem; }
      h2 { font-size: 1.125rem; font-weight: 650; color: var(--c-g900); letter-spacing: -0.01em; margin: 0 0 .5rem; }
      p { margin: 0 0 .6rem; }
      a { color: var(--c-primary); }

      /* Buttons — default = primary; .ghost = secondary/neutral */
      button {
        font: inherit; font-weight: 600; font-size: .9rem;
        padding: .6rem 1.1rem; min-height: 44px; margin: .2rem .4rem .2rem 0;
        cursor: pointer; border: 1px solid transparent; border-radius: var(--r-sm);
        background: var(--c-primary); color: #fff;
        transition: background var(--ease) .15s, box-shadow var(--ease) .15s, opacity .15s;
      }
      button:hover { background: var(--c-primary-hover); }
      button:active { background: var(--c-primary-active); }
      button:disabled { opacity: .45; cursor: default; }
      button.ghost { background: #fff; color: var(--c-g700); border-color: var(--c-g300); }
      button.ghost:hover { background: var(--c-g100); }
      *:focus-visible { outline: 2px solid var(--c-primary); outline-offset: 2px; }

      input {
        width: 100%; max-width: 100%; height: 44px; padding: 0 .8rem; font: inherit; font-size: 1rem;
        color: var(--c-g900); background: #fff; border: 1.5px solid var(--c-g300); border-radius: var(--r-sm);
        transition: border-color .15s, box-shadow .15s;
      }
      input:hover { border-color: var(--c-g400); }
      input:focus { outline: none; border-color: var(--c-primary); box-shadow: 0 0 0 3px rgba(79,70,229,.14); }

      .topbar { display: flex; align-items: center; justify-content: space-between; padding-bottom: .9rem; margin-bottom: 1.25rem; border-bottom: 1px solid var(--c-g200); }
      .topbar .brand { font-size: 1.2rem; font-weight: 700; color: var(--c-g700); letter-spacing: -0.01em; }
      .topbar .brand::after { content: ''; }
      .menu { position: relative; }
      .menu-btn { background: #fff; color: var(--c-g900); border-color: var(--c-g300); }
      .menu-btn:hover { background: var(--c-g100); }
      .menu-pop { position: absolute; right: 0; top: 112%; background: #fff; border: 1px solid var(--c-g200); border-radius: var(--r-md); box-shadow: var(--sh-md); min-width: 13rem; padding: .35rem; z-index: 40; }
      .menu-pop button { display: block; width: 100%; text-align: left; background: #fff; color: var(--c-g700); border: none; margin: 0; min-height: 38px; font-weight: 500; }
      .menu-pop button:hover { background: var(--c-g100); }

      .panel { padding: 1.25rem 1.35rem; border: 1px solid var(--c-g200); border-radius: var(--r-md); background: #fff; box-shadow: var(--sh-sm); margin-bottom: 1rem; }
      .broker { border-color: var(--c-primary-border); background: linear-gradient(#fff, var(--c-primary-subtle)); }
      .muted { color: var(--c-g500); font-size: .9rem; }
      .ok { color: var(--c-success); } .err { color: var(--c-danger); }
      code { background: var(--c-g100); color: var(--c-g700); padding: .1rem .35rem; border-radius: 5px; font-size: .85em; }
      .badge { display: inline-block; font-size: .7rem; font-weight: 600; letter-spacing: .02em; padding: .15rem .5rem; border-radius: 999px; background: var(--c-primary-subtle); color: var(--c-primary); border: 1px solid var(--c-primary-border); }
      ul { padding-left: 1.1rem; } li { margin: .3rem 0; }

      .modal-backdrop { position: fixed; inset: 0; background: rgba(17,24,39,.55); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1rem; animation: fade .2s var(--ease); }
      .modal { background: #fff; border-radius: var(--r-lg); padding: 1.6rem 1.75rem; width: min(30rem, 94vw); box-shadow: var(--sh-modal); animation: pop .28s var(--ease); }
      .modal h2 { margin-top: 0; }
      .steps { list-style: none; padding: 0; margin: .8rem 0; }
      .steps li { padding: .35rem 0; display: flex; align-items: center; gap: .6rem; font-size: .95rem; }
      .steps li.pending { color: var(--c-g400); } .steps li.done { color: var(--c-success); } .steps li.current { color: var(--c-g900); font-weight: 600; }
      .spinner { width: 1.05rem; height: 1.05rem; border: 2px solid var(--c-g300); border-top-color: var(--c-primary); border-radius: 50%; display: inline-block; animation: spin .65s linear infinite; flex: 0 0 auto; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fade { from { opacity: 0; } }
      @keyframes pop { from { opacity: 0; transform: translateY(8px) scale(.98); } }
      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
