<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentic Connect — your secure home</title>
    <style>
      /* ── Design tokens ─────────────────────────────────────────────── */
      :root {
        --c-primary: #4f46e5; --c-primary-hover: #4338ca; --c-primary-active: #3730a3;
        --c-primary-subtle: #f5f3ff; --c-primary-border: #c7d2fe;
        --c-primary-mid: #818cf8;
        --c-g900: #111827; --c-g700: #374151; --c-g500: #6b7280; --c-g400: #9ca3af;
        --c-g300: #d1d5db; --c-g200: #e5e7eb; --c-g100: #f3f4f6; --c-g50: #f9fafb;
        --c-success: #16a34a; --c-success-bg: #f0fdf4; --c-success-border: #bbf7d0;
        --c-danger: #dc2626; --c-danger-bg: #fef2f2; --c-danger-border: #fecaca;
        --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 20px;
        --sh-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
        --sh-md: 0 4px 14px rgba(17,24,39,.08), 0 2px 6px rgba(17,24,39,.05);
        --sh-card: 0 2px 12px rgba(79,70,229,.08), 0 1px 4px rgba(17,24,39,.06);
        --sh-modal: 0 24px 60px rgba(17,24,39,.20), 0 6px 18px rgba(17,24,39,.10);
        --ease: cubic-bezier(0.16, 1, 0.3, 1);
        /* Popup is narrower than full-page mobile; cap at 420px */
        --app-max: 420px;
        --app-px: 20px;
      }

      /* ── Reset & base ──────────────────────────────────────────────── */
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        background: #fff;
        color: var(--c-g700);
        margin: 0;
        padding: 0;
        min-height: 100dvh;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      /* ── App shell (standalone app, not popup) ─────────────────────── */
      #root {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }
      .app-shell {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 760px;
        width: 100%;
        margin: 2.5rem auto;
        padding: 0 1.25rem;
      }

      /* ── Typography ────────────────────────────────────────────────── */
      h1 {
        font-size: 1.75rem;
        font-weight: 800;
        color: var(--c-g900);
        letter-spacing: -0.03em;
        margin: 0 0 .5rem;
        line-height: 1.2;
      }
      h2 {
        font-size: 1.125rem;
        font-weight: 650;
        color: var(--c-g900);
        letter-spacing: -0.01em;
        margin: 0 0 .5rem;
        line-height: 1.3;
      }
      h3 {
        font-size: .8rem;
        font-weight: 600;
        color: var(--c-g400);
        text-transform: uppercase;
        letter-spacing: .07em;
        margin: 0 0 .75rem;
      }
      p { margin: 0 0 .6rem; }
      a { color: var(--c-primary); }
      .muted { color: var(--c-g500); font-size: .9rem; }
      .ok { color: var(--c-success); }
      .err { color: var(--c-danger); }
      .accent { color: var(--c-primary); }
      code {
        background: var(--c-g100);
        color: var(--c-g700);
        padding: .1rem .35rem;
        border-radius: 5px;
        font-size: .85em;
      }

      /* ── Focus ring ────────────────────────────────────────────────── */
      *:focus-visible { outline: 2px solid var(--c-primary); outline-offset: 2px; }

      /* ── Buttons (standalone app) ───────────────────────────────────── */
      button {
        font: inherit; font-weight: 600; font-size: .9rem;
        padding: .6rem 1.1rem; min-height: 44px; margin: .2rem .4rem .2rem 0;
        cursor: pointer; border: 1px solid transparent; border-radius: var(--r-sm);
        background: var(--c-primary); color: #fff;
        display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
        transition: background var(--ease) .15s, box-shadow var(--ease) .15s, opacity .15s;
        white-space: nowrap;
      }
      button:hover { background: var(--c-primary-hover); }
      button:active { background: var(--c-primary-active); }
      button:disabled { opacity: .45; cursor: default; }
      button.ghost { background: #fff; color: var(--c-g700); border-color: var(--c-g300); }
      button.ghost:hover { background: var(--c-g100); }
      button.ghost:disabled { background: #fff; }

      /* ── Popup-specific button overrides ───────────────────────────── */
      /* Full-width CTA — used inside .popup-card */
      button.cta {
        width: 100%;
        font-size: 1rem;
        padding: .9rem 1.25rem;
        min-height: 54px;
        border-radius: var(--r-lg);
        box-shadow: 0 2px 8px rgba(79,70,229,.28);
        letter-spacing: -.01em;
        margin: 0;
      }
      button.cta:not(:disabled):hover { box-shadow: 0 4px 14px rgba(79,70,229,.36); }

      /* Full-width ghost CTA */
      button.cta.ghost {
        box-shadow: none;
        color: var(--c-g700);
        border-color: var(--c-g300);
        border-width: 1.5px;
        margin: 0;
      }
      button.cta.ghost:hover { background: var(--c-g50); box-shadow: none; }

      /* ── Inputs ─────────────────────────────────────────────────────── */
      input {
        width: 100%; max-width: 100%; height: 44px; padding: 0 .8rem; font: inherit; font-size: 1rem;
        color: var(--c-g900); background: #fff; border: 1.5px solid var(--c-g300); border-radius: var(--r-sm);
        transition: border-color .15s, box-shadow .15s;
      }
      input:hover { border-color: var(--c-g400); }
      input:focus { outline: none; border-color: var(--c-primary); box-shadow: 0 0 0 3px rgba(79,70,229,.14); }

      /* ── Standalone app panels ──────────────────────────────────────── */
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
      .panel { padding: 1.25rem 1.35rem; border: 1px solid var(--c-g200); border-radius: var(--r-md); background: #fff; box-shadow: var(--sh-sm); margin-bottom: 1rem; }
      .broker { border-color: var(--c-primary-border); background: linear-gradient(#fff, var(--c-primary-subtle)); }
      pre { background: var(--c-g100); padding: .6rem; border-radius: var(--r-sm); overflow-x: auto; font-size: .78rem; }
      ul { padding-left: 1.1rem; } li { margin: .3rem 0; }

      /* ── Badge / pill ───────────────────────────────────────────────── */
      .badge {
        display: inline-flex;
        align-items: center;
        font-size: .7rem;
        font-weight: 600;
        letter-spacing: .03em;
        padding: .2rem .55rem;
        border-radius: 999px;
        background: var(--c-primary-subtle);
        color: var(--c-primary);
        border: 1px solid var(--c-primary-border);
        white-space: nowrap;
      }

      /* Step indicator pill "Step 1 of 2" */
      .step-indicator {
        display: inline-flex;
        align-items: center;
        gap: .35rem;
        font-size: .75rem;
        font-weight: 600;
        color: var(--c-primary);
        background: var(--c-primary-subtle);
        border: 1px solid var(--c-primary-border);
        border-radius: 999px;
        padding: .2rem .625rem;
        margin-bottom: .75rem;
        letter-spacing: .01em;
      }
      .step-dots {
        display: flex;
        gap: .3rem;
        align-items: center;
      }
      .step-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--c-primary-border);
      }
      .step-dot.active { background: var(--c-primary); }

      /* ── Spinner ────────────────────────────────────────────────────── */
      .spinner {
        width: 1.05rem;
        height: 1.05rem;
        border: 2px solid var(--c-g300);
        border-top-color: var(--c-primary);
        border-radius: 50%;
        display: inline-block;
        animation: spin .65s linear infinite;
        flex-shrink: 0;
      }
      .spinner-lg {
        width: 2rem;
        height: 2rem;
        border-width: 3px;
      }

      /* ── Steps checklist (modal + popup) ───────────────────────────── */
      .steps { list-style: none; padding: 0; margin: .5rem 0 1rem; }
      .steps li {
        padding: .4rem 0;
        display: flex;
        align-items: flex-start;
        gap: .6rem;
        font-size: .9375rem;
        line-height: 1.4;
      }
      .steps li.pending { color: var(--c-g400); }
      .steps li.done { color: var(--c-success); }
      .steps li.current { color: var(--c-g900); font-weight: 600; }
      .steps .step-icon { flex-shrink: 0; margin-top: .1em; width: 1.1em; text-align: center; }

      /* ── Signup progress modal (standalone app) ─────────────────────── */
      .modal-backdrop {
        position: fixed; inset: 0;
        background: rgba(17,24,39,.55);
        backdrop-filter: blur(2px);
        display: flex; align-items: center; justify-content: center;
        z-index: 50; padding: 1rem;
        animation: fade .2s var(--ease);
      }
      .modal {
        background: #fff;
        border-radius: var(--r-lg);
        padding: 1.6rem 1.75rem;
        width: min(30rem, 94vw);
        box-shadow: var(--sh-modal);
        animation: pop .28s var(--ease);
      }
      .modal h2 { margin-top: 0; }

      /* ── Keyframes ───────────────────────────────────────────────────── */
      @keyframes spin  { to { transform: rotate(360deg); } }
      @keyframes fade  { from { opacity: 0; } }
      @keyframes pop   { from { opacity: 0; transform: translateY(8px) scale(.98); } }
      @keyframes float1 {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-5px); }
      }
      @keyframes float2 {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(4px); }
      }

      /* ── Reduced motion ──────────────────────────────────────────────── */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: .01ms !important;
          transition-duration: .01ms !important;
        }
      }

      /* ════════════════════════════════════════════════════════════════
         POPUP / CONSENT SCREEN STYLES
         These apply when demo-sso is opened as a popup by a relying site.
         Layout: single-column mobile card, max 420px, centered, white bg
         with a blue radial gradient wash at the bottom.
         ════════════════════════════════════════════════════════════════ */

      /* Popup root wrapper */
      .popup-root {
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
        background: #fff;
        position: relative;
        overflow: hidden;
      }
      /* Gradient wash — blue radial bloom rising from the bottom */
      .popup-root::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: -60px;
        transform: translateX(-50%);
        width: 500px;
        height: 380px;
        background: radial-gradient(ellipse at 50% 80%, rgba(99,102,241,.16) 0%, rgba(139,92,246,.07) 40%, transparent 72%);
        pointer-events: none;
        z-index: 0;
      }

      /* Scrollable content column */
      .popup-scroll {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: var(--app-max);
        width: 100%;
        margin: 0 auto;
        padding: 0 var(--app-px);
        position: relative;
        z-index: 1;
        overflow-y: auto;
      }

      /* ── Popup top bar (brand + host chip) ──────────────────────────── */
      .popup-topbar {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem 0 .75rem;
        gap: .5rem;
      }
      .popup-brand {
        display: flex;
        align-items: center;
        gap: .5rem;
        font-size: .875rem;
        font-weight: 700;
        color: var(--c-g900);
        letter-spacing: -0.01em;
      }

      /* CSS shield logo (matches demo-org) */
      .brand-shield {
        width: 28px;
        height: 28px;
      }

      /* ── Popup heading area ─────────────────────────────────────────── */
      .popup-heading {
        padding: .25rem 0 1rem;
        text-align: left;
      }
      .popup-heading h1 {
        font-size: 1.625rem;
        font-weight: 800;
        color: var(--c-g900);
        letter-spacing: -0.03em;
        line-height: 1.2;
        margin: 0 0 0;
      }
      /* The agent name / org name rendered in indigo */
      .popup-heading .accent-name {
        color: var(--c-primary);
      }

      /* ── Entity chip (the relying host, or org name) ────────────────── */
      .entity-chip {
        display: flex;
        align-items: center;
        gap: .625rem;
        padding: .625rem .875rem;
        background: #fff;
        border: 1px solid var(--c-g200);
        border-radius: var(--r-lg);
        box-shadow: var(--sh-card);
        margin: .875rem 0 1rem;
      }
      .entity-chip-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: var(--c-primary-subtle);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        flex-shrink: 0;
        color: var(--c-primary);
      }
      .entity-chip-meta { flex: 1; min-width: 0; }
      .entity-chip-name {
        font-weight: 600;
        font-size: .9375rem;
        color: var(--c-g900);
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .entity-chip-sub {
        font-size: .78rem;
        color: var(--c-g400);
        font-family: 'SF Mono', 'Roboto Mono', monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .entity-chip-badge {
        font-size: .7rem;
        font-weight: 600;
        color: var(--c-success);
        background: var(--c-success-bg);
        border: 1px solid var(--c-success-border);
        border-radius: 999px;
        padding: .15rem .5rem;
        white-space: nowrap;
        flex-shrink: 0;
      }

      /* ── Can / cannot tinted cards ──────────────────────────────────── */
      .perm-card {
        border-radius: var(--r-lg);
        padding: 1rem 1rem .875rem;
        margin-bottom: .75rem;
      }
      .perm-card.can {
        background: var(--c-success-bg);
        border: 1px solid var(--c-success-border);
      }
      .perm-card.cannot {
        background: var(--c-g50);
        border: 1px solid var(--c-g200);
      }
      .perm-card-title {
        font-size: .75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .06em;
        margin-bottom: .625rem;
      }
      .perm-card.can .perm-card-title { color: var(--c-success); }
      .perm-card.cannot .perm-card-title { color: var(--c-g500); }
      .perm-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: .4rem;
      }
      .perm-list li {
        display: flex;
        align-items: flex-start;
        gap: .5rem;
        font-size: .875rem;
        line-height: 1.45;
        color: var(--c-g700);
        margin: 0;
      }
      .perm-icon {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: .65rem;
        flex-shrink: 0;
        margin-top: .1em;
        font-weight: 700;
      }
      .perm-icon.ok  { background: var(--c-success-bg); color: var(--c-success); border: 1.5px solid var(--c-success-border); }
      .perm-icon.no  { background: #fff; color: var(--c-g400); border: 1.5px solid var(--c-g300); }

      /* ── Running / progress state ───────────────────────────────────── */
      .ceremony-card {
        background: #fff;
        border: 1px solid var(--c-primary-border);
        border-radius: var(--r-xl);
        padding: 1.5rem 1.25rem 1.25rem;
        margin: .5rem 0 1rem;
        text-align: center;
        box-shadow: var(--sh-card);
      }
      .ceremony-spinner-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
      }

      /* ── Error card ─────────────────────────────────────────────────── */
      .error-card {
        background: var(--c-danger-bg);
        border: 1px solid var(--c-danger-border);
        border-radius: var(--r-lg);
        padding: 1rem 1.125rem;
        margin-bottom: 1rem;
      }
      .error-card-title {
        font-weight: 700;
        font-size: .9375rem;
        color: var(--c-danger);
        margin-bottom: .25rem;
      }
      .error-card-body {
        font-size: .875rem;
        color: var(--c-g700);
        margin: 0;
      }

      /* ── Blocked (not-allowed) card ─────────────────────────────────── */
      .blocked-card {
        background: var(--c-danger-bg);
        border: 1px solid var(--c-danger-border);
        border-radius: var(--r-xl);
        padding: 1.5rem 1.25rem;
        margin: .5rem 0 1rem;
        text-align: center;
      }
      .blocked-icon {
        font-size: 2rem;
        margin-bottom: .75rem;
      }

      /* ── CTA action area ────────────────────────────────────────────── */
      .popup-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: .75rem 0 .25rem;
      }

      /* ── Privacy footer ─────────────────────────────────────────────── */
      .privacy-footer {
        padding: .875rem 0 max(1.25rem, env(safe-area-inset-bottom, 1.25rem));
        text-align: center;
        font-size: .78rem;
        color: var(--c-g400);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
