<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adopt a Frontier People Group · JP (demo)</title>
    <style>
      :root {
        /* demo-jp identity — a "global mission" teal, distinct from demo-org (emerald) +
           demo-sso (amber/indigo). Warm gold accent for the adopt highlights. */
        --c-primary: #0f766e; --c-primary-hover: #0d6157; --c-primary-active: #115e59;
        --c-primary-subtle: #f0fdfa; --c-primary-border: #99f6e4; --c-primary-mid: #2dd4bf;
        --c-accent: #b45309; --c-accent-subtle: #fffbeb; --c-accent-border: #fcd34d;
        --c-g900: #0f172a; --c-g800: #1e293b; --c-g700: #334155; --c-g600: #475569;
        --c-g500: #64748b; --c-g400: #94a3b8; --c-g300: #cbd5e1; --c-g200: #e2e8f0;
        --c-g100: #f1f5f9; --c-g50: #f8fafc;
        --r-sm: 8px; --r-md: 12px; --r-lg: 16px; --r-xl: 22px;
        --sh-sm: 0 1px 2px rgba(15,23,42,.06); --sh-md: 0 4px 16px rgba(15,23,42,.08);
        --sh-lg: 0 18px 50px rgba(15,23,42,.12);
        --maxw: 1080px;
      }
      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0; color: var(--c-g800); background: #fff;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.55; -webkit-font-smoothing: antialiased;
      }
      h1, h2, h3 { color: var(--c-g900); line-height: 1.15; margin: 0; letter-spacing: -.01em; }
      p { margin: 0; }
      a { color: var(--c-primary); }
      .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 1.25rem; }
      .section { padding: 4rem 0; }
      .eyebrow { font-size: .75rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: var(--c-primary); }

      /* Buttons */
      .btn { display: inline-flex; align-items: center; gap: .5rem; border: none; border-radius: 999px;
        font-size: .95rem; font-weight: 700; padding: .8rem 1.4rem; cursor: pointer; text-decoration: none;
        transition: background .15s, transform .05s; }
      .btn:active { transform: translateY(1px); }
      .btn-primary { background: var(--c-primary); color: #fff; }
      .btn-primary:hover { background: var(--c-primary-hover); }
      .btn-ghost { background: #fff; color: var(--c-primary); border: 1.5px solid var(--c-primary-border); }
      .btn-ghost:hover { background: var(--c-primary-subtle); }
      .btn-lg { padding: .95rem 1.7rem; font-size: 1rem; }

      /* Demo-site disclaimer banner — UNMISSABLE. Lives outside #root in index.html so it
         shows on first paint, before React hydrates. Stays visible across every screen.
         Patterned bright amber (warning), high-contrast, with a JP-not-affiliated statement. */
      .demo-banner {
        position: relative; z-index: 50;
        background: repeating-linear-gradient(
          135deg, #fde68a 0 14px, #fcd34d 14px 28px
        );
        color: #78350f;
        border-bottom: 3px solid #b45309;
        padding: .7rem 1rem;
        text-align: center;
        font-weight: 800;
        font-size: clamp(.85rem, 2.6vw, 1rem);
        letter-spacing: .02em;
        line-height: 1.35;
      }
      .demo-banner strong { display: inline-block; background: #b45309; color: #fff; padding: .12rem .6rem; border-radius: 4px; margin-right: .35rem; letter-spacing: .12em; }
      .demo-banner small { display: block; font-weight: 600; font-size: .78rem; opacity: .85; margin-top: .15rem; }

      /* Top bar */
      .topbar { position: sticky; top: 0; z-index: 40; background: rgba(255,255,255,.9);
        backdrop-filter: blur(8px); border-bottom: 1px solid var(--c-g200); }

      /* Header-level catch-all alert — sticks right under the topbar (top: 64px) so it
         stays visible while the body scrolls. Visible on every signed-in screen, not
         just the onboarding flow — so a returning member with a stale profile still
         sees what JP needs. Amber = action required, red = blocking. */
      .header-alert {
        position: sticky; top: 64px; z-index: 35;
        border-bottom: 2px solid var(--header-alert-edge, #b45309);
        background: var(--header-alert-bg, linear-gradient(180deg, #fef3c7, #fde68a));
        color: var(--header-alert-fg, #78350f);
      }
      .header-alert.red { --header-alert-edge: #b91c1c; --header-alert-bg: linear-gradient(180deg, #fee2e2, #fecaca); --header-alert-fg: #7f1d1d; }
      .header-alert-inner {
        max-width: var(--maxw); margin: 0 auto; padding: .65rem 1.25rem;
        display: flex; align-items: center; gap: .85rem; flex-wrap: wrap;
      }
      .header-alert-icon {
        width: 28px; height: 28px; border-radius: 999px; flex: 0 0 auto;
        background: currentColor; color: #fff;
        display: flex; align-items: center; justify-content: center;
        font-weight: 900; font-size: .9rem;
        filter: brightness(.85);
      }
      .header-alert .header-alert-icon { color: var(--header-alert-edge, #b45309); }
      .header-alert-body { flex: 1 1 240px; min-width: 0; }
      .header-alert-body strong { display: block; font-weight: 800; font-size: .9rem; }
      .header-alert-body span { display: block; font-size: .8rem; opacity: .85; margin-top: .1rem; }
      .header-alert-action {
        background: var(--header-alert-edge, #b45309); color: #fff; border: none;
        padding: .5rem 1rem; border-radius: 999px; font-weight: 700; font-size: .82rem; cursor: pointer;
        flex: 0 0 auto; white-space: nowrap;
      }
      .header-alert-action:hover { filter: brightness(1.05); }
      .topbar .wrap { display: flex; align-items: center; justify-content: space-between; height: 64px; }
      .brand { display: flex; align-items: center; gap: .6rem; font-weight: 800; color: var(--c-g900); }
      .brand-glyph { width: 34px; height: 34px; border-radius: 11px; background: linear-gradient(150deg, var(--c-primary-mid), var(--c-primary-active));
        display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: var(--sh-sm); }
      .brand small { display: block; font-size: .68rem; font-weight: 600; color: var(--c-g500); letter-spacing: .02em; }
      .powered { display: inline-flex; align-items: center; gap: .4rem; font-size: .72rem; font-weight: 700;
        color: var(--c-g600); background: var(--c-g100); border: 1px solid var(--c-g200); border-radius: 999px; padding: .35rem .7rem; }
      .powered b { color: var(--c-primary); }

      /* Hero */
      .hero { background: radial-gradient(900px 380px at 70% -10%, var(--c-primary-subtle), #fff 70%); padding: 4.5rem 0 3rem; }
      .hero h1 { font-size: clamp(2rem, 5vw, 3.25rem); max-width: 16ch; }
      .hero-sub { font-size: 1.15rem; color: var(--c-g600); margin-top: 1rem; max-width: 54ch; }
      .hero-note { font-size: .85rem; color: var(--c-g500); margin-top: .75rem; }
      .hero-cta { display: flex; flex-wrap: wrap; gap: .75rem; margin-top: 1.75rem; }

      /* Stat band */
      .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-top: 3rem; }
      .stat { background: #fff; border: 1px solid var(--c-g200); border-radius: var(--r-lg); padding: 1.1rem 1.2rem; box-shadow: var(--sh-sm); }
      .stat-v { font-size: 1.7rem; font-weight: 800; color: var(--c-g900); }
      .stat-v .of { font-size: 1rem; font-weight: 700; color: var(--c-g400); }
      .stat-l { font-size: .82rem; color: var(--c-g500); margin-top: .2rem; }

      /* Movements */
      .movements { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-top: 2rem; }
      .move { text-align: left; }
      .move-k { width: 40px; height: 40px; border-radius: 12px; background: var(--c-accent-subtle); color: var(--c-accent);
        border: 1px solid var(--c-accent-border); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.2rem; }
      .move h3 { font-size: 1rem; margin: .65rem 0 .3rem; }
      .move p { font-size: .85rem; color: var(--c-g500); }

      /* Two paths */
      .paths { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2rem; }
      .path { border: 1px solid var(--c-g200); border-radius: var(--r-xl); padding: 1.75rem; background: #fff; box-shadow: var(--sh-md); display: flex; flex-direction: column; }
      .path.accent { border-color: var(--c-primary-border); background: linear-gradient(180deg, var(--c-primary-subtle) 0%, #fff 30%); }
      .path h3 { font-size: 1.4rem; }
      .path-who { font-size: .78rem; font-weight: 700; color: var(--c-primary); text-transform: uppercase; letter-spacing: .04em; margin: .5rem 0; }
      .path-body { color: var(--c-g600); font-size: .95rem; }
      .path ol { margin: 1.1rem 0 1.4rem; padding-left: 0; list-style: none; counter-reset: s; display: flex; flex-direction: column; gap: .55rem; }
      .path ol li { counter-increment: s; position: relative; padding-left: 2rem; font-size: .88rem; color: var(--c-g700); }
      .path ol li::before { content: counter(s); position: absolute; left: 0; top: -1px; width: 1.35rem; height: 1.35rem; border-radius: 50%;
        background: var(--c-primary); color: #fff; font-size: .72rem; font-weight: 800; display: flex; align-items: center; justify-content: center; }
      .path .btn { margin-top: auto; align-self: flex-start; }

      /* Trust */
      .trust { background: var(--c-g900); color: #e2e8f0; border-radius: var(--r-xl); padding: 2.5rem; }
      .trust h2 { color: #fff; font-size: 1.8rem; max-width: 18ch; }
      .trust-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem 2rem; margin-top: 1.75rem; }
      .trust-pt { display: flex; gap: .65rem; font-size: .92rem; color: #cbd5e1; }
      .trust-pt svg { flex: 0 0 auto; color: var(--c-primary-mid); margin-top: 2px; }

      /* Generic section heading */
      .sec-head { max-width: 60ch; margin-bottom: .25rem; }
      .sec-head h2 { font-size: 1.9rem; }
      .sec-head p { color: var(--c-g600); margin-top: .6rem; }

      /* Agreements */
      .agreements { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
      .agreement { border: 1px solid var(--c-g200); border-radius: var(--r-lg); padding: 1.25rem; background: var(--c-g50); }
      .agreement h3 { font-size: 1.05rem; }
      .agreement p { color: var(--c-g600); font-size: .88rem; margin-top: .35rem; }
      .agreement button { margin-top: .75rem; background: none; border: none; color: var(--c-primary); font-weight: 700; cursor: pointer; padding: 0; font-size: .85rem; }

      /* Onboarding panel + modal */
      .scrim { position: fixed; inset: 0; background: rgba(15,23,42,.55); display: flex; align-items: center; justify-content: center; padding: 1.25rem; z-index: 60; }
      .panel { background: #fff; border-radius: var(--r-xl); max-width: 560px; width: 100%; max-height: 88vh; overflow: auto; box-shadow: var(--sh-lg); padding: 2rem; }
      .panel h2 { font-size: 1.5rem; }
      .panel .who { color: var(--c-primary); font-weight: 700; font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; margin-top: .25rem; }
      .panel ol { margin: 1.25rem 0; padding-left: 0; list-style: none; counter-reset: s; display: flex; flex-direction: column; gap: .7rem; }
      .panel ol li { counter-increment: s; position: relative; padding-left: 2.1rem; color: var(--c-g700); font-size: .92rem; }
      .panel ol li::before { content: counter(s); position: absolute; left: 0; top: 0; width: 1.45rem; height: 1.45rem; border-radius: 50%;
        background: var(--c-primary-subtle); color: var(--c-primary); border: 1px solid var(--c-primary-border); font-size: .75rem; font-weight: 800; display: flex; align-items: center; justify-content: center; }
      .panel-foot { display: flex; gap: .6rem; align-items: center; margin-top: 1.25rem; flex-wrap: wrap; }
      .panel-x { float: right; background: none; border: none; font-size: 1.4rem; line-height: 1; color: var(--c-g400); cursor: pointer; }
      .soon { font-size: .8rem; color: var(--c-g500); background: var(--c-g100); border: 1px solid var(--c-g200); border-radius: var(--r-sm); padding: .55rem .75rem; }

      /* "Connect via Impact Community" SSO button — distinctive, parallel to "Continue with Google". */
      .btn-sso {
        display: flex; align-items: center; gap: .65rem;
        width: 100%; padding: .85rem 1rem;
        background: #fff; color: var(--c-g900);
        border: 1.5px solid var(--c-g300); border-radius: 12px;
        font-size: 1rem; font-weight: 700; cursor: pointer; text-align: left;
        box-shadow: var(--sh-sm);
        transition: border-color .15s, background .15s;
      }
      .btn-sso:hover:not(:disabled) { border-color: var(--c-primary); background: var(--c-primary-subtle); }
      .btn-sso:disabled { opacity: .6; cursor: not-allowed; }
      .btn-sso-glyph {
        width: 28px; height: 28px; border-radius: 8px; flex: 0 0 auto;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(150deg, var(--c-primary-mid), var(--c-primary-active));
        color: #fff; box-shadow: var(--sh-sm);
      }
      .wea-text { font-size: .9rem; color: var(--c-g700); }
      .wea-text li { margin-bottom: .6rem; }

      footer { border-top: 1px solid var(--c-g200); padding: 2rem 0; color: var(--c-g500); font-size: .82rem; }
      footer .wrap { display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }

      @media (max-width: 820px) {
        .stats, .movements, .paths, .trust-grid, .agreements { grid-template-columns: 1fr; }
        .movements { grid-template-columns: 1fr 1fr; }
        .stats { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <!-- Demo-site disclaimer: visible from first paint, on every screen, NOT a React component.
         This site is a prototype on agenticprimitives.dev — "JP" is a placeholder for the
         underlying program; no affiliation or endorsement is implied. -->
    <div class="demo-banner" role="alert" aria-live="polite">
      <strong>DEMO</strong> Prototype only — <u>not affiliated with or endorsed by any real organization</u>. "JP" is a placeholder; this site demonstrates the self-sovereign onboarding pattern on agenticprimitives.dev.
      <small>No real adoption is brokered here. This is a pattern demonstration only.</small>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
