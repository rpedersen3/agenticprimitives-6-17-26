# Cloudflare Worker config for demo-mcp.
#
# Local dev:  wrangler dev (uses local D1 SQLite at .wrangler/state-mcp/v3/d1/)
# Production: wrangler deploy + wrangler d1 migrations apply demo-mcp
#
# D1 holds profiles + token_usage (JTI replay tracking).

name = "demo-mcp"
main = "src/index.ts"
compatibility_date = "2026-05-19"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8788
local_protocol = "http"

[[d1_databases]]
binding = "DB"
database_name = "demo-mcp"
database_id = "a7c95b56-8753-47ae-a044-446d5d37cf58"   # overwrite per env in production
migrations_dir = "migrations"

[vars]
RPC_URL = "http://127.0.0.1:8545"
CHAIN_ID = "31337"
MCP_AUDIENCE = "urn:mcp:server:person"
# spec 277 Phase 2: acknowledge local-AES vault envelope keys (testnet demo).
# The vault adapter bridges this into process.env where key-custody's
# LocalAesProvider guard reads it. Replace with a managed KMS backend before
# any real-value data. VAULT_MASTER_KEY itself is a wrangler SECRET, not a var.
A2A_ALLOW_LOCAL_ENVELOPE_KEY = "true"
# spec 277 Phase 6: enable the OPEN demo authorization endpoint (/oauth/token).
# Fail-closed — the route 404s unless this is 'true'. Testnet demo only (mock
# seed data); a real production leaves it unset and wires a real AS + JWKS.
DEMO_OAUTH_MINT_ENABLED = "true"

# ──────────────────────────────────────────────────────────────────────────
# Production environment — Worker name: "demo-mcp-production"
#
# Deploy via `pnpm deploy:cloudflare`. Contract addresses are injected via
# `--var` flags from deployments-base-sepolia.json at deploy time.
#
# REQUIRED ONE-TIME SETUP — paste the production D1 database_id below after:
#   wrangler d1 create demo-mcp
#   wrangler d1 migrations apply demo-mcp --remote --env production
# The deploy script re-runs `migrations apply` on every deploy (idempotent).
# ──────────────────────────────────────────────────────────────────────────

[env.production.vars]
# RPC_URL intentionally omitted — see apps/demo-a2a/wrangler.toml for
# the rationale. Set as a wrangler secret instead.
CHAIN_ID = "84532"
A2A_ALLOW_LOCAL_ENVELOPE_KEY = "true"
MCP_AUDIENCE = "urn:mcp:server:person"
# Testnet demo: enable the open /oauth/token demo authorization endpoint (mock
# seed data only). A real production deployment removes this + wires a real AS.
DEMO_OAUTH_MINT_ENABLED = "true"

[[env.production.d1_databases]]
binding = "DB"
database_name = "demo-mcp"
database_id = "a7c95b56-8753-47ae-a044-446d5d37cf58"
migrations_dir = "migrations"
