<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agenticprimitives — cross-cutting capability showcase</title>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; color: #222; }
      h1 { margin-bottom: 0.25rem; }
      h1 + p { color: #666; margin-top: 0; }
      h2 { margin-top: 2.5rem; border-bottom: 1px solid #eee; padding-bottom: 0.25rem; }
      button { padding: 0.5rem 1rem; margin-right: 0.5rem; cursor: pointer; }
      pre { background: #f5f5f5; padding: 0.75rem; border-radius: 4px; overflow-x: auto; font-size: 0.85rem; }
      .card { display: block; margin: 0.75rem 0; padding: 1rem 1.25rem; border: 1px solid #e0e0e0; border-radius: 6px; text-decoration: none; color: inherit; }
      .card:hover { border-color: #aaa; background: #fafafa; }
      .card h3 { margin: 0 0 0.25rem; }
      .card p { margin: 0; color: #555; font-size: 0.95rem; }
      .badge { display: inline-block; font-size: 0.75rem; padding: 0.1rem 0.5rem; border-radius: 999px; background: #eee; color: #555; margin-left: 0.5rem; vertical-align: middle; }
      .badge.in-flight { background: #fff3cd; color: #856404; }
      .badge.stub { background: #f8d7da; color: #721c24; }
      .ok { color: #0a7d0a; }
      .err { color: #b00; }
      .muted { color: #666; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
