  - id: DEL-001
    severity: critical
    title: delegation session key not bound to the delegated authority (observe-and-re-mint)
    status: closed
    concerns:
      - packages/delegation/src/token.ts
      - apps/demo-mcp/src/index.ts
      - apps/demo-a2a/src/index.ts
    anchor: sessionDelegateBindingError
    tests:
      - packages/delegation/test/unit/verify-universal-validator.test.ts
      - packages/delegation/test/unit/remint-attack.test.ts
    enforcement: production-enforced
    origin: archive/2026-06-09/2026-06-09-independent-package-audit.md
    note: >
      v4 binds the session-delegation leaf to the DELEGATOR (the principal SA) and validates via the
      UniversalSignatureValidator (connection-agnostic). The LIBRARY default is now fail-closed
      (ADR-0036): verifyDelegationToken rejects any token lacking a valid sessionDelegation leaf unless
      the caller passes the explicit, greppable opt-out `allowUnboundSessionToken: true`. The prior
      opt-in flags (requireSessionDelegateBinding / strictSessionBinding) are removed — a verifier that
      configures nothing is now SAFE by default, closing the observe-and-re-mint class universally
      instead of per-source. mcp-runtime threads the same opt-out through McpResourceVerifyConfig;
      demo-mcp leaves it default (binding enforced) for the vault server and sets it true ONLY on the
      documented persona/C-1 legacy hole. spec 270 v4.

