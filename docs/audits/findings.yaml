  - id: ATT-1
    severity: high
    title: assertJointAgreement issuer signature over bare credentialHash (SC-2 class, issuer side)
    status: open
    concerns: [packages/contracts/src/attestation/AttestationRegistry.sol]
    origin: 2026-06-10-contract-by-contract-audit.md
    note: >
      The issuer signature is verified over a bare req.credentialHash with no typehash/parties/schema/
      chain/contract binding, so a known issuer signature can anchor a spoofed joint attestation. (The
      bilateral-consent half is correctly bound via JOINT_CONSENT_TYPEHASH.) Fix: an ISSUER typehash
      digest binding parties/schema/credentialType/credentialHash/chainId/address(this), mirroring SC-2.
