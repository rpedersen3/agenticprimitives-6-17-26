# ─────────────────────────────────────────────────────────────────────────────
# SINGLE SOURCE OF TRUTH for security findings (audit ledger).
#
# This file — not prose docs — is the authoritative status of every first-class
# security finding. Dated audit reports under docs/audits/archive/ are immutable
# historical snapshots; their findings are reconciled HERE.
#
# CI gate: `pnpm check:audit-freshness` validates every entry:
#   - all `concerns` paths exist
#   - a `closed` finding's `anchor` string is present in at least one `concerns` file
#     (so "closed" can't drift from source — the fix must actually be there)
#   - required fields present; severity/status from the controlled vocab
#   - every closed critical/high finding declares `enforcement:` (below) — and any below
#     `production-enforced` is reported as ENFORCEMENT-PENDING so "closed" can't overclaim.
#
# `status` = is the fix in source (proven by `anchor`). `enforcement` = how strongly it is actually
# IN FORCE — a separate, harder question. A code hook that exists but is opt-in / default-off is
# `closed` + `test-covered`, NOT `production-enforced`. Keep them honest and distinct.
#
# Update rule: when a finding's status changes, edit it HERE in the same PR.
# Severity:     critical | high | medium | low
# Status:       closed | open | accepted-risk | deferred
# Enforcement:  code-present | test-covered | production-enforced | deployed   (weakest → strongest;
#               required on every closed critical/high finding)
# ─────────────────────────────────────────────────────────────────────────────

