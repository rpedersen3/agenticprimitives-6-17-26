  - id: CA-F1
    severity: high
    title: factory counterfactual address omits mode/trustees/timelocks → pre-deploy custody hijack
    status: closed
    concerns: [packages/contracts/src/AgentAccountFactory.sol]
    anchor: _effectiveSalt
    enforcement: production-enforced
    origin: 2026-06-10-contract-by-contract-audit.md
    tests:
      - packages/contracts/test/AgentAccountFactoryMode.t.sol
    note: >
      Fixed per ADR-0035: the deploy salt is now keccak256(abi.encode(salt, mode, trustees,
      timelockOverrides)), so the CREATE2 address commits to the FULL custody config (mode/trustees/
      timelocks) on top of the custodians+passkey already in the bytecode hash. A front-runner can no
      longer occupy a victim's counterfactual address with weaker/attacker recovery config — any change
      yields a different address. This also closes CA-F2 (silent adoption) by construction: the
      occupied branch is reachable only by an identical-config request, so no separate config-equality
      assertion is needed. getAddressForAgentAccount gains a timelockOverrides param; the agent-account
      client + app predictors thread the deploy-time tuple. NOTE: moves all CREATE2 addresses → needs a
      full factory redeploy (CON-FACTORY-001 still tracks the governance side). 5 property tests +
      full 764-test contract suite green.
  - id: CP-1
    severity: medium
    title: custody tier thresholds default to 1-of-n (unconfigured quorum collapses to single signer)
    status: closed
    concerns: [packages/contracts/src/custody/CustodyPolicy.sol]
    anchor: UnconfiguredTier
    enforcement: test-covered
    origin: 2026-06-10-contract-by-contract-audit.md
    tests:
      - packages/contracts/test/CustodyPolicyBranchR610b.t.sol
    note: >
      Fixed: onInstall now (a) floors each unset tier from _defaultApprovals using a best-effort
      custodianCount read from the installing account, and (b) HARD-REVERTS UnconfiguredTier(4)/(5)
      for any non-single (mode≥1) install where the admin/critical tiers end up unset — so a direct
      onInstall that bypasses the factory with a zeroed/partial array can no longer collapse to 1-of-n.
      Defense-in-depth: _approvalsValue now fails closed (UnconfiguredTier(6)) on a T6 read — the
      recovery quorum lives in recoveryApprovals, never the tier map. Mode 0 (single) is unaffected.
      7 CP-1 regression tests (direct-install revert, partial-tier revert, mode-0 ok, T6 read fail-closed,
      real-account flooring via a mock that answers custodianCount). enforcement: test-covered (contract
      code + tests; deployed-enforcement awaits the next Base Sepolia redeploy).
