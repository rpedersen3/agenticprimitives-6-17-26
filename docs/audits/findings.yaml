  # ── Contract deep audit 2026-06-10 (OPEN — mainnet blockers; see the dated report) ──────────
  - id: CA-F1
    severity: high
    title: factory counterfactual address omits mode/trustees/timelocks → pre-deploy custody hijack
    status: open
    concerns: [packages/contracts/src/AgentAccountFactory.sol]
    origin: 2026-06-10-contract-by-contract-audit.md
    note: >
      The CREATE2 salt commits only to custodians/passkey/salt, not mode/trustees/timelockOverrides
      (applied post-deploy). An attacker who knows a victim's public salt+custodians front-runs
      deployment at the canonical address with attacker-chosen recovery trustees, then drives a
      CustodyPolicy recovery to seize the identity. Fix: fold config into salt/initialize + assert
      config-match on the occupied branch. MAINNET BLOCKER.
  - id: CP-1
    severity: high
    title: custody tier thresholds default to 1-of-n (unconfigured quorum collapses to single signer)
    status: open
    concerns: [packages/contracts/src/custody/CustodyPolicy.sol]
    origin: 2026-06-10-contract-by-contract-audit.md
    note: >
      onInstall only writes a tier when thresholds[t] > 0; _approvalsValue returns 1 for 0; the
      _defaultApprovals matrix is never invoked. A zeroed/partial threshold array lets one custodian key
      rotate the whole custodian set (T4) or upgrade the implementation (T5). Fix: populate defaults at
      install + hard-revert unconfigured T4–T6. MAINNET BLOCKER.
  - id: AN-1-ONCHAIN
    severity: high
    title: on-chain name registry enforces no label normalization (SDK fix bypassable by direct callers)
    status: open
    concerns: [packages/contracts/src/naming/AgentNameRegistry.sol]
    origin: 2026-06-10-contract-by-contract-audit.md
    note: >
      register/initializeRoot only check EmptyLabel then hash raw bytes; the TS normalizeLabel (AN-1)
      is bypassable by any direct caller → homoglyph/mixed-case/zero-width/embedded-dot squatting of
      .agent names is live on-chain. Fix: enforce [a-z0-9-] charset on-chain.
