  - id: DEL-001
    severity: critical
    title: delegation session key not bound to the delegated authority (observe-and-re-mint)
    status: closed
    concerns:
      - packages/delegation/src/token.ts
      - apps/demo-mcp/src/index.ts
      - apps/demo-a2a/src/index.ts
    anchor: sessionDelegateBindingError
    tests:
      - packages/delegation/test/unit/verify-universal-validator.test.ts
    origin: archive/2026-06-09/2026-06-09-independent-package-audit.md
    note: >
      v4 binds the session-delegation leaf to the DELEGATOR (the principal SA) and
      validates via the UniversalSignatureValidator (connection-agnostic). Activated
      live: demo-jp client-mints the leaf-bound token, demo-a2a forwards with
      enforceBinding, demo-mcp sets requireSessionDelegateBinding. spec 270 v4.

