      OWN-storage mirror `_pausedMirror` instead; the mirror is refreshed OUT of validation by a
      permissionless `syncPauseFromGovernance()` (cache-of-canonical, ADR-0013 — no second mechanism) or
      a governance `setPauseMirror`. 3 PM-1 regression tests (validation ignores un-synced governance
      pause, permissionless sync propagates, setPauseMirror is governance-only). enforcement: test-covered
      (deployed-enforcement awaits the next Base Sepolia redeploy).
  - id: PM-2
    severity: medium
    title: paymaster EntryPoint deposit drainable by the Ownable owner (no timelock, decoupled from governance)
    status: closed
    concerns: [packages/contracts/src/SmartAgentPaymaster.sol]
    anchor: scheduleDepositWithdrawal
    enforcement: test-covered
    origin: 2026-06-10-contract-by-contract-audit.md
    tests:
      - packages/contracts/test/SmartAgentPaymasterValidateR610.t.sol
    note: >
      The inherited BasePaymaster.withdrawTo is `public onlyOwner` and NON-virtual (can't be overridden),
      so the contract-level fix adds a governance-native, TIMELOCKED drain: scheduleDepositWithdrawal /
      executeDepositWithdrawal / cancelDepositWithdrawal (onlyGovernance, DEPOSIT_WITHDRAWAL_TIMELOCK=48h).
      This couples a withdrawal to governance (→ the 24h TimelockController via governance.execute) AND a
      48h delay, so the sponsorship treasury can't be emptied in one tx by a governance action either. The
      residual instant owner `withdrawTo` is closed operationally by handing the Ownable owner to the
      governance timelock via Ownable2Step (documented in the contract's production checklist; bootstrap
      window tracked under the governance-key custody item CON-FACTORY-001). 5 PM-2 regression tests
      (onlyGovernance, pre-timelock revert, post-timelock payout, cancel, no-pending revert). enforcement:
      test-covered.
  - id: GOV-1
    severity: medium
    title: immutable guardian can perpetually re-pause (permanent DoS, redeploy-only fix)
    status: closed
    concerns: [packages/contracts/src/governance/AgenticGovernance.sol]
    anchor: setGuardian
    enforcement: test-covered
    origin: 2026-06-10-contract-by-contract-audit.md
    tests:
      - packages/contracts/test/governance/AgenticGovernance.t.sol
    note: >
      Fixed: the guardian (fast-pause) role moved from `immutable` to a storage var rotatable by the
      timelock (`setGuardian`, onlyTimelock + non-zero). A compromised guardian that perpetually
      re-pauses can now be rotated out after one timelock window WITHOUT a governance redeploy, so the
      DoS is bounded instead of permanent. Declared after the existing storage vars so slots don't shift;
      AgenticGovernance is not proxy-upgradeable (and not in the storage-layout lock set). 3 regression
      tests incl. the headline rotate-out-griefing-guardian scenario. enforcement: test-covered (redeploy pending).
  - id: WA-1
    severity: medium
    title: WebAuthn/P256 verification lacks low-s enforcement (P-256 signature malleability)
    status: closed
    concerns: [packages/contracts/src/libraries/WebAuthnLib.sol]
    anchor: P256_N_DIV_2
    enforcement: test-covered
    origin: 2026-06-10-contract-by-contract-audit.md
    tests:
      - packages/contracts/test/libraries/WebAuthnLib.t.sol
    note: >
      Fixed: WebAuthnLib.verify rejects high-s signatures (s > n/2, the P256_N_DIV_2 bound) before the
      RIP-7212 call. RIP-7212 accepts both (r,s) and (r,n−s), so without this a second valid signature
      always existed over the same message — malleable for any path treating a signature as unique. The
      bound sits at the single library chokepoint, covering both the native ERC-1271 passkey path and the
      custody-quorum slot recovery. 2 regression tests (high-s rejected even with RIP-7212 mocked success;
      s == n/2 boundary accepted). enforcement: test-covered (awaits the next Base Sepolia redeploy).
  - id: WA-2
    severity: medium
    title: WebAuthn UV enforced only on opt-in; the live custody caller passes requireUv=false
    status: closed
    concerns:
      - packages/contracts/src/libraries/WebAuthnLib.sol
      - packages/contracts/src/libraries/SignatureSlotRecovery.sol
    anchor: requireUv
    enforcement: test-covered
    origin: 2026-06-10-contract-by-contract-audit.md
    tests:
      - packages/contracts/test/libraries/SignatureSlotBounds.t.sol
    note: >
      The native ERC-1271 path (AgentAccount._verifyWebAuthn) already required UV (R8.2). The remaining
      gap was SignatureSlotRecovery — the custody-COUNCIL quorum path (CustodyPolicy trustees/custodians
      authorizing a recovery or admin change) — which passed requireUv=false, accepting UP-only
      assertions on the highest-assurance signatures in the system. Flipped to requireUv=true, consistent
      with the native path: a UP-only custody assertion is now rejected; custody signers' browser
      ceremonies MUST use userVerification:'required'. 1 slot-level regression test (UP-only custody
      assertion reverts PasskeySigInvalid). enforcement: test-covered (awaits the next Base Sepolia redeploy).
