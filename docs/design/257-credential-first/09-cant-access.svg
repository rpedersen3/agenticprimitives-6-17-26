  <text x="40" y="162" font-family="'Inter',-apple-system,Segoe UI,Roboto,sans-serif" font-size="12.5" font-weight="400" fill="#475569" text-anchor="start" opacity="1">the same one, with everything intact.</text>
  <rect x="40" y="192" width="310" height="62" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="1"/><text x="58" y="220" font-family="'Inter',-apple-system,Segoe UI,Roboto,sans-serif" font-size="13.5" font-weight="700" fill="#0f172a" text-anchor="start" opacity="1">Use another sign-in you already added</text><text x="58" y="240" font-family="'Inter',-apple-system,Segoe UI,Roboto,sans-serif" font-size="11.5" font-weight="400" fill="#94a3b8" text-anchor="start" opacity="1">passkey · wallet</text><text x="334" y="230" font-family="'Inter',-apple-system,Segoe UI,Roboto,sans-serif" font-size="18" font-weight="400" fill="#475569" text-anchor="end" opacity="1">→</text><rect x="40" y="268" width="310" height="62" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="1"/><text x="58" y="296" font-family="'Inter',-apple-system,Segoe UI,Roboto,sans-serif" font-size="13.5" font-weight="700" fill="#0f172a" text-anchor="start" opacity="1">Ask your trusted recovery people</text><text x="58" y="316" font-family="'Inter',-apple-system,Segoe UI,Roboto,sans-serif" font-size="11.5" font-weight="400" fill="#94a3b8" text-anchor="start" opacity="1">2-of-3 quorum</text><text x="334" y="306" font-family="'Inter',-apple-system,Segoe UI,Roboto,sans-serif" font-size="18" font-weight="400" fill="#475569" text-anchor="end" opacity="1">→</text><rect x="40" y="344" width="310" height="62" rx="13" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="1"/><text x="58" y="372" font-family="'Inter',-apple-system,Segoe UI,Roboto,sans-serif" font-size="13.5" font-weight="700" fill="#0f172a" text-anchor="start" opacity="1">I know my Impact name or address</text><text x="58" y="392" font-family="'Inter',-apple-system,Segoe UI,Roboto,sans-serif" font-size="11.5" font-weight="400" fill="#94a3b8" text-anchor="start" opacity="1">identify your home</text><text x="334" y="382" font-family="'Inter',-apple-system,Segoe UI,Roboto,sans-serif" font-size="18" font-weight="400" fill="#475569" text-anchor="end" opacity="1">→</text>
  <rect x="40" y="432" width="310" height="40" rx="11" fill="#f0fdfa" stroke="#e2e8f0" stroke-width="1" opacity="1"/>
  <text x="56" y="457" font-family="'Inter',-apple-system,Segoe UI,Roboto,sans-serif" font-size="11.5" font-weight="700" fill="#0f766e" text-anchor="start" opacity="1">Recover access — never a new identity.</text>

