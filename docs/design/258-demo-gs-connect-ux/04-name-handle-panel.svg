</defs><rect x="0" y="56" width="820" height="544" rx="0" fill="#f8fafc" stroke="none" stroke-width="1" opacity="1"/><rect x="0" y="0" width="820" height="56" rx="0" fill="#1e1b4b" stroke="none" stroke-width="1" opacity="1"/><circle cx="32" cy="28" r="11" fill="#4f46e5" stroke="none" stroke-width="1"/><text x="50" y="33" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="start" opacity="1">Global Switchboard</text><text x="196" y="33" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" font-weight="500" fill="#a5b4fc" text-anchor="start" opacity="1">· by Global.Church</text><rect x="672" y="13" width="128" height="38" rx="11" fill="#4f46e5" stroke="none" stroke-width="1.5" opacity="1"/><text x="736" y="37" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Connect</text><rect x="160" y="56" width="500" height="490" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="1"/><text x="200" y="84" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="10" font-weight="800" fill="#4f46e5" text-anchor="start" opacity="1">CONNECT</text><text x="200" y="108" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start" opacity="1">Connect with Global.Church</text><text x="200" y="136" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" font-weight="400" fill="#475569" text-anchor="start" opacity="1">Use your Global.Church identity to enter Switchboard.</text><text x="200" y="154" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="400" fill="#475569" text-anchor="start" opacity="1">You can offer your expertise or set up an organization after you connect.</text><rect x="200" y="168" width="420" height="44" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" opacity="1"/><text x="220" y="189" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="600" fill="#4f46e5" text-anchor="start" opacity="1">Switchboard receives only what you approve</text><text x="220" y="205" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="400" fill="#4f46e5" text-anchor="start" opacity="1">· your contact stays private until you accept a connection</text><rect x="200" y="228" width="420" height="46" rx="11" fill="#4f46e5" stroke="none" stroke-width="1.5" opacity="1"/><text x="410" y="256" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14.5" font-weight="700" fill="#ffffff" text-anchor="middle">Continue with Global.Church</text><rect x="200" y="290" width="420" height="1" rx="0" fill="#e2e8f0" stroke="none" stroke-width="1" opacity="1"/><text x="200" y="308" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="10" font-weight="800" fill="#64748b" text-anchor="start" opacity="1">YOUR IMPACT NAME</text><text x="200" y="323" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#475569" text-anchor="start" opacity="1">Your public handle — people can find your agent by this name.</text><rect x="200" y="332" width="420" height="44" rx="9" fill="#ffffff" stroke="#4f46e5" stroke-width="2" opacity="1"/><text x="212" y="359" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14" font-weight="400" fill="#94a3b8" text-anchor="start" opacity="1" font-style="italic">e.g. rich-pedersen</text><rect x="200" y="384" width="420" height="48" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" opacity="1"/><text x="216" y="402" font-family="'SF Mono','Roboto Mono',ui-monospace,monospace" font-size="13" font-weight="600" fill="#4f46e5" text-anchor="start">rich-pedersen</text><text x="309.6" y="402" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="600" fill="#94a3b8" text-anchor="start" opacity="1">.impact</text><text x="216" y="420" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="400" fill="#94a3b8" text-anchor="start" opacity="1">Home at rich-pedersen.impact-agent.me</text><rect x="506" y="390" width="89.19999999999999" height="22" rx="11" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1" opacity="1"/><text x="520" y="405" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="700" fill="#16a34a" text-anchor="start" opacity="1">available</text><text x="200" y="444" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" font-weight="400" fill="#94a3b8" text-anchor="start" opacity="1">You do not need a name to sign back in — it is a public handle, not a password.</text><text x="410" y="468" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" font-weight="600" fill="#4f46e5" text-anchor="middle" opacity="1">Hide — use Google or passkey without a name</text><rect x="0" y="600" width="820" height="30" rx="0" fill="#0b1324" stroke="none" stroke-width="1" opacity="1"/><text x="410" y="620" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="700" fill="#94a3b8" text-anchor="middle" opacity="1">04 · Name/handle panel — expanded secondary path</text></svg>