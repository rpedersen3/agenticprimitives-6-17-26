<svg xmlns="http://www.w3.org/2000/svg" width="820" height="630" viewBox="0 0 820 630"><defs>
  <filter id="sh" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
  </filter>
</defs><rect x="0" y="56" width="820" height="544" rx="0" fill="#f8fafc" stroke="none" stroke-width="1" opacity="1"/><rect x="0" y="0" width="820" height="56" rx="0" fill="#1e1b4b" stroke="none" stroke-width="1" opacity="1"/><circle cx="32" cy="28" r="11" fill="#4f46e5" stroke="none" stroke-width="1"/><text x="50" y="33" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="start" opacity="1">Global Switchboard</text><text x="196" y="33" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" font-weight="500" fill="#a5b4fc" text-anchor="start" opacity="1">· by Global.Church</text><rect x="602" y="14" width="204" height="28" rx="14" fill="#312e81" stroke="none" stroke-width="1" opacity="1"/><circle cx="620" cy="28" r="7" fill="#0d9488" stroke="none" stroke-width="1"/><text x="634" y="33" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="start" opacity="1">rich-pedersen</text><rect x="490" y="532" width="310" height="48" rx="12" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5" opacity="1"/><circle cx="512" cy="556" r="9" fill="#16a34a" stroke="none" stroke-width="1"/><text x="504" y="560" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="800" fill="#ffffff" text-anchor="start" opacity="1">✓</text><text x="529" y="551" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="700" fill="#0f172a" text-anchor="start" opacity="1">Connected · welcome</text><text x="529" y="568" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="400" fill="#475569" text-anchor="start" opacity="1">You can publish, browse, and connect.</text><text x="48" y="100" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="24" font-weight="800" fill="#0f172a" text-anchor="start" opacity="1">Welcome, rich-pedersen</text><text x="48" y="128" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" font-weight="400" fill="#475569" text-anchor="start" opacity="1">You're connected. Choose what you want to do — you can do both, and switch any time.</text><text x="48" y="146" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" font-weight="400" fill="#475569" text-anchor="start" opacity="1">Roles are workspaces, not separate accounts.</text><rect x="48" y="166" width="350" height="200" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="1"/><rect x="48" y="166" width="6" height="200" rx="3" fill="#4f46e5"/><rect x="70" y="182" width="68.8" height="22" rx="11" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" opacity="1"/><text x="84" y="197" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="start" opacity="1">SUPPLY</text><text x="70" y="226" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="16.5" font-weight="800" fill="#0f172a" text-anchor="start" opacity="1">Offer your expertise (KC)</text><text x="70" y="248" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="400" fill="#475569" text-anchor="start" opacity="1">Act as your own individual person agent</text><text x="84" y="270" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="start" opacity="1">• Publish your expertise offering</text><text x="84" y="288" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="start" opacity="1">• Browse coarsened demand</text><text x="84" y="306" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="start" opacity="1">• Accept requests on your terms</text><rect x="70" y="330" width="160" height="38" rx="11" fill="#4f46e5" stroke="none" stroke-width="1.5" opacity="1"/><text x="150" y="354" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Offer your expertise</text><rect x="420" y="166" width="350" height="200" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="1"/><rect x="420" y="166" width="6" height="200" rx="3" fill="#3730a3"/><rect x="442" y="182" width="68.8" height="22" rx="11" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" opacity="1"/><text x="456" y="197" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="700" fill="#3730a3" text-anchor="start" opacity="1">DEMAND</text><text x="442" y="226" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="16.5" font-weight="800" fill="#0f172a" text-anchor="start" opacity="1">Set up an organization (GCO)</text><text x="442" y="248" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="400" fill="#475569" text-anchor="start" opacity="1">An organization you create and sign for</text><text x="456" y="270" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="start" opacity="1">• Create the org + mint its grant</text><text x="456" y="288" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="start" opacity="1">• Post a skill need</text><text x="456" y="306" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#374151" text-anchor="start" opacity="1">• Review explainable matches</text><rect x="442" y="330" width="180" height="38" rx="11" fill="#3730a3" stroke="none" stroke-width="1.5" opacity="1"/><text x="532" y="354" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Set up an organization</text><rect x="48" y="390" width="722" height="52" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" opacity="1"/><text x="72" y="410" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="700" fill="#4f46e5" text-anchor="start" opacity="1">Open Global.Church home</text><text x="72" y="428" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#64748b" text-anchor="start" opacity="1">Your data lives in your Global.Church home; Switchboard reads only what you grant.</text><text x="48" y="460" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="400" fill="#94a3b8" text-anchor="start" opacity="1">Note: if you connected without a name, the welcome greeting reads “welcome, you”.</text><text x="48" y="476" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="400" fill="#94a3b8" text-anchor="start" opacity="1">The public handle is optional and claimable later from your Impact home.</text><rect x="0" y="600" width="820" height="30" rx="0" fill="#0b1324" stroke="none" stroke-width="1" opacity="1"/><text x="410" y="620" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="700" fill="#94a3b8" text-anchor="middle" opacity="1">05 · Success — connected in place, role hub (GCO vs KC choice)</text></svg>