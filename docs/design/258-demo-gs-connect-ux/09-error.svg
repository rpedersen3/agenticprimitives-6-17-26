</defs><rect x="0" y="56" width="820" height="544" rx="0" fill="#f8fafc" stroke="none" stroke-width="1" opacity="1"/><rect x="0" y="0" width="820" height="56" rx="0" fill="#1e1b4b" stroke="none" stroke-width="1" opacity="1"/><circle cx="32" cy="28" r="11" fill="#4f46e5" stroke="none" stroke-width="1"/><text x="50" y="33" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="start" opacity="1">Global Switchboard</text><text x="196" y="33" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" font-weight="500" fill="#a5b4fc" text-anchor="start" opacity="1">· by Global.Church</text><rect x="672" y="13" width="128" height="38" rx="11" fill="#4f46e5" stroke="none" stroke-width="1.5" opacity="1"/><text x="736" y="37" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Connect</text><rect x="160" y="68" width="500" height="480" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="1"/><rect x="180" y="84" width="460" height="52" rx="10" fill="#fef2f2" stroke="#fecaca" stroke-width="1" opacity="1"/><text x="200" y="103" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="700" fill="#b91c1c" text-anchor="start" opacity="1">Sign-in failed</text><text x="200" y="121" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#b91c1c" text-anchor="start" opacity="1">Your home did not return a Switchboard access grant — please try again.</text><text x="200" y="160" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="10" font-weight="800" fill="#4f46e5" text-anchor="start" opacity="1">CONNECT</text><text x="200" y="182" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="21" font-weight="800" fill="#0f172a" text-anchor="start" opacity="1">Connect with Global.Church</text><text x="200" y="210" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" font-weight="400" fill="#475569" text-anchor="start" opacity="1">Use your Global.Church identity to enter Switchboard.</text><text x="200" y="228" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="400" fill="#475569" text-anchor="start" opacity="1">You can offer your expertise or set up an organization after you connect.</text><rect x="200" y="248" width="420" height="44" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" opacity="1"/><text x="220" y="269" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="600" fill="#4f46e5" text-anchor="start" opacity="1">Switchboard receives only what you approve</text><text x="220" y="285" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="400" fill="#4f46e5" text-anchor="start" opacity="1">· your contact stays private until you accept a connection</text><rect x="200" y="308" width="420" height="46" rx="11" fill="#4f46e5" stroke="none" stroke-width="1.5" opacity="1"/><text x="410" y="336" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14.5" font-weight="700" fill="#ffffff" text-anchor="middle">Try again</text><text x="410" y="374" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="600" fill="#4f46e5" text-anchor="middle" opacity="1">Use my Impact name instead</text><rect x="285" y="377" width="190" height="1" rx="0" fill="#c7d2fe" stroke="none" stroke-width="1" opacity="1"/><text x="200" y="398" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start" opacity="1">Your Impact name is a public handle. You do not need it to sign back in.</text><text x="200" y="426" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="600" fill="#4f46e5" text-anchor="start" opacity="1">← Back to Switchboard</text><rect x="0" y="600" width="820" height="30" rx="0" fill="#0b1324" stroke="none" stroke-width="1" opacity="1"/><text x="410" y="620" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="700" fill="#94a3b8" text-anchor="middle" opacity="1">09 · Error state — exchange failed, explicit banner, retry available</text></svg>