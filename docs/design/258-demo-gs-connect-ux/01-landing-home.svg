</defs><rect x="0" y="56" width="820" height="544" rx="0" fill="#f8fafc" stroke="none" stroke-width="1" opacity="1"/><rect x="0" y="0" width="820" height="56" rx="0" fill="#1e1b4b" stroke="none" stroke-width="1" opacity="1"/><circle cx="32" cy="28" r="11" fill="#4f46e5" stroke="none" stroke-width="1"/><text x="50" y="33" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="start" opacity="1">Global Switchboard</text><text x="196" y="33" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11.5" font-weight="500" fill="#a5b4fc" text-anchor="start" opacity="1">· by Global.Church</text><rect x="672" y="13" width="128" height="38" rx="11" fill="#4f46e5" stroke="none" stroke-width="1.5" opacity="1"/><text x="736" y="37" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Connect</text><text x="48" y="108" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="24" font-weight="800" fill="#0f172a" text-anchor="start" opacity="1">Find the expertise your mission needs —</text><text x="48" y="138" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="24" font-weight="800" fill="#4f46e5" text-anchor="start" opacity="1">or offer yours.</text><text x="48" y="168" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" font-weight="400" fill="#475569" text-anchor="start" opacity="1">Global.Church holds your identity and data. Switchboard brokers</text><text x="48" y="186" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="13.5" font-weight="400" fill="#475569" text-anchor="start" opacity="1">explainable matches. You grant scoped access at sign-in and revoke it any time.</text><rect x="48" y="210" width="280" height="46" rx="11" fill="#4f46e5" stroke="none" stroke-width="1.5" opacity="1"/><text x="188" y="238" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14.5" font-weight="700" fill="#ffffff" text-anchor="middle">Continue with Global.Church</text><text x="48" y="277" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start" opacity="1">Connect once, then choose what to do — offer expertise or post needs.</text><rect x="48" y="300" width="340" height="130" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="1"/><rect x="68" y="318" width="109.6" height="22" rx="11" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" opacity="1"/><text x="82" y="333" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="start" opacity="1">DEMAND · GCO</text><text x="68" y="360" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="400" fill="#374151" text-anchor="start" opacity="1">You have a ministry gap. Declare what skill</text><text x="68" y="378" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="400" fill="#374151" text-anchor="start" opacity="1">or capability you need — Switchboard matches</text><text x="68" y="396" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="400" fill="#374151" text-anchor="start" opacity="1">you with a Kingdom Consultant.</text><text x="68" y="416" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#4f46e5" text-anchor="start" opacity="1">Connect to post a need →</text><rect x="412" y="300" width="340" height="130" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="1"/><rect x="432" y="318" width="102.8" height="22" rx="11" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1" opacity="1"/><text x="446" y="333" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="700" fill="#4f46e5" text-anchor="start" opacity="1">SUPPLY · KC</text><text x="432" y="360" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="400" fill="#374151" text-anchor="start" opacity="1">You have a skill to offer. Publish your expertise</text><text x="432" y="378" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="400" fill="#374151" text-anchor="start" opacity="1">profile and Switchboard matches you with</text><text x="432" y="396" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12.5" font-weight="400" fill="#374151" text-anchor="start" opacity="1">organizations that need exactly what you serve.</text><text x="432" y="416" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="700" fill="#4f46e5" text-anchor="start" opacity="1">Connect to offer a skill →</text><rect x="48" y="450" width="724" height="100" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" opacity="1"/><text x="68" y="476" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="10" font-weight="800" fill="#64748b" text-anchor="start" opacity="1">PUBLIC SKILL-GAP SIGNAL</text><text x="68" y="496" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="14.5" font-weight="700" fill="#0f172a" text-anchor="start" opacity="1">Open skill gaps right now</text><text x="68" y="514" font-family="'Inter',-apple-system,'Segoe UI',Roboto,sans-serif" font-size="12" font-weight="400" fill="#94a3b8" text-anchor="start" opacity="1">6 open needs in the public demand feed. Counts only — never a specific match.</text><rect x="480" y="468" width="260" height="12" rx="6" fill="#f1f5f9" stroke="none" stroke-width="1" opacity="1"/><rect x="480" y="468" width="210" height="12" rx="6" fill="#6366f1" stroke="none" stroke-width="1" opacity="1"/><rect x="480" y="486" width="260" height="12" rx="6" fill="#f1f5