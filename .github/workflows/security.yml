name: Security

# Supply-chain + SAST scans (audit M7 closure).
# Runs on every PR + push to master, and on a weekly schedule so newly
# disclosed CVEs surface even when no new code lands.
#
# Each job is independent so one slow scanner doesn't block the others.
# All jobs fail-close: any high/critical finding fails the workflow.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # 04:17 UTC every Monday — catches new CVEs disclosed over the weekend.
    - cron: '17 4 * * 1'
  workflow_dispatch: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write     # CodeQL uploads to GH Code Scanning
  actions: read

jobs:
  codeql:
    name: CodeQL (JS/TS SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Cover web + Node ecosystems; the security-extended pack adds
          # query packs beyond the default (e.g. prototype pollution,
          # ReDoS, command-injection patterns) at the cost of ~2x
          # analysis time. Worth it for a security workflow.
          queries: security-extended

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  dep-audit:
    name: Dependency audit (pnpm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail on HIGH or CRITICAL CVEs. MODERATE + LOW go to logs but
      # don't block — they're triaged in the next refresh window.
      - name: pnpm audit --audit-level=high
        run: pnpm audit --audit-level=high
        # The continue-on-error trick lets us capture the full output
        # for the audit log even on failure. Set to true if you want
        # advisory-only mode; false (default) blocks PRs.

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history for the rule-set to look across
          # commits, not just the tip.
          fetch-depth: 0

      - name: gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The action ships a sensible default ruleset; we'd add a
          # `.gitleaks.toml` here only if we needed allowlists (e.g.
          # known false-positive patterns in golden test fixtures).

  # H7-E.6: promoted from advisory-only. The release workflow
  # (.github/workflows/release.yml) generates the SBOM as a release
  # asset on every publish; this security-workflow run still produces
  # a daily SBOM for the master tree so the artifact has a stable home
  # for between-release auditor browsing.
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generate an SBOM. Doesn't gate the PR; published as a workflow
      # artifact so an auditor can browse + verify against deployed
      # builds.
      - name: Generate SBOM (CycloneDX)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-file sbom.cyclonedx.json \
            --output-format JSON

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

  # ─── Slither — Solidity static analysis (H7-E.1) ────────────────
  # CodeQL (above) covers JS/TS; Slither catches Solidity-side
  # patterns: reentrancy, unchecked-return, uninitialized storage,
  # shadowed inherited vars, etc. Tunable via slither.config.json.
  # Fails the PR on any HIGH-severity finding (LOW + INFORMATIONAL
  # go to logs for triage).
  slither:
    name: Slither (Solidity SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contract dependencies (forge-std + AA + OZ)
        working-directory: packages/contracts
        run: bash setup.sh

      - uses: crytic/slither-action@v0.4.0
        with:
          target: packages/contracts/
          fail-on: high
          slither-config: packages/contracts/slither.config.json
          # Sarif output uploaded to GH Code Scanning for diff-view in PRs.
          sarif: slither-results.sarif
        continue-on-error: false

      - name: Upload Slither SARIF to GH Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: slither-results.sarif

  # ─── Strict peer-dependency check (audit P1-7) ──────────────────
  # The repo's `.npmrc` keeps `auto-install-peers=true` +
  # `strict-peer-dependencies=false` so day-to-day local + CI
  # installs aren't disrupted by transitive peer mismatches. But
  # security-sensitive packages (mcp-runtime, delegation, key-custody)
  # bind peer ranges that need to resolve cleanly without auto-fill.
  # This job runs a parallel strict install in a clean working tree
  # and fails the PR if any required peer is unmet.
  strict-peers:
    runs-on: ubuntu-latest
    name: Strict peer-dependency check
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install with strict peers (no auto-fill)
        run: |
          pnpm install \
            --frozen-lockfile \
            --strict-peer-dependencies \
            --config.auto-install-peers=false
