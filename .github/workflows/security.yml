name: Security

# Supply-chain + SAST scans (audit M7 closure).
# Runs on every PR + push to master, and on a weekly schedule so newly
# disclosed CVEs surface even when no new code lands.
#
# Each job is independent so one slow scanner doesn't block the others.
# All jobs fail-close: any high/critical finding fails the workflow.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # 04:17 UTC every Monday — catches new CVEs disclosed over the weekend.
    - cron: '17 4 * * 1'
  workflow_dispatch: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write     # CodeQL uploads to GH Code Scanning
  actions: read

jobs:
  codeql:
    name: CodeQL (JS/TS SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Cover web + Node ecosystems; the security-extended pack adds
          # query packs beyond the default (e.g. prototype pollution,
          # ReDoS, command-injection patterns) at the cost of ~2x
          # analysis time. Worth it for a security workflow.
          queries: security-extended

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

  dep-audit:
    name: Dependency audit (pnpm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail on HIGH or CRITICAL CVEs. MODERATE + LOW go to logs but
      # don't block — they're triaged in the next refresh window.
      - name: pnpm audit --audit-level=high
        run: pnpm audit --audit-level=high
        # The continue-on-error trick lets us capture the full output
        # for the audit log even on failure. Set to true if you want
        # advisory-only mode; false (default) blocks PRs.

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs full history for the rule-set to look across
          # commits, not just the tip.
          fetch-depth: 0

      # H7-E (post-push fix): the official `gitleaks/gitleaks-action@v2`
      # now requires a paid `GITLEAKS_LICENSE` for org accounts (breaking
      # change made by gitleaks.io in 2024). Run the upstream binary
      # directly — it's still open-source under MIT — to keep the gate
      # free + self-hosted-friendly. Same default rule set; same fail-
      # close behavior on a finding.
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks scan
        # `.gitleaks.toml` at repo root holds the allowlist of verified
        # false-positive paths (test fixtures, snapshot literals, etc.).
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --redact --exit-code 1

  # H7-E.6: promoted from advisory-only. The release workflow
  # (.github/workflows/release.yml) generates the SBOM as a release
  # asset on every publish; this security-workflow run still produces
  # a daily SBOM for the master tree so the artifact has a stable home
  # for between-release auditor browsing.
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # H7-E (post-push fix): generate SBOM with the cdxgen tool which
      # speaks pnpm natively. The previous `@cyclonedx/cyclonedx-npm`
      # tool invokes `npm ls` under the hood and chokes on pnpm's
      # symlink-based hoisting (npm doesn't see the dev-deps that pnpm
      # holds in .pnpm/). cdxgen is the upstream CycloneDX-recommended
      # generator + understands all major package managers.
      - name: Generate SBOM (CycloneDX, cdxgen)
        run: |
          npx --yes @cyclonedx/cdxgen@^11 -t pnpm -o sbom.cyclonedx.json .

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

  # ─── Slither — Solidity static analysis (H7-E.1) ────────────────
  # CodeQL (above) covers JS/TS; Slither catches Solidity-side
  # patterns: reentrancy, unchecked-return, uninitialized storage,
  # shadowed inherited vars, etc. Tunable via slither.config.json.
  # Fails the PR on any HIGH-severity finding (LOW + INFORMATIONAL
  # go to logs for triage).
  slither:
    name: Slither (Solidity SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contract dependencies (forge-std + AA + OZ)
        working-directory: packages/contracts
        run: bash setup.sh

      - uses: crytic/slither-action@v0.4.0
        with:
          target: packages/contracts/
          fail-on: high
          slither-config: packages/contracts/slither.config.json
          # Sarif output uploaded to GH Code Scanning for diff-view in PRs.
          sarif: slither-results.sarif
        continue-on-error: false

      - name: Upload Slither SARIF to GH Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: slither-results.sarif

  # ─── Strict peer-dependency check (audit P1-7) ──────────────────
  # The repo's `.npmrc` keeps `auto-install-peers=true` +
  # `strict-peer-dependencies=false` so day-to-day local + CI
  # installs aren't disrupted by transitive peer mismatches. But
  # security-sensitive packages (mcp-runtime, delegation, key-custody)
  # bind peer ranges that need to resolve cleanly without auto-fill.
  # This job runs a parallel strict install in a clean working tree
  # and fails the PR if any required peer is unmet.
  strict-peers:
    runs-on: ubuntu-latest
    name: Strict peer-dependency check
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # H7-E (post-push fix): drop `version:` — `pnpm/action-setup@v4`
      # rejects when both `version:` AND a `packageManager: pnpm@…`
      # field in package.json are set. We pin via package.json
      # (single source of truth) so the action picks it up.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # H7-E (post-push fix): can't combine `--frozen-lockfile` with
      # `--config.auto-install-peers=false` — pnpm 9 encodes the
      # auto-install setting INTO the lockfile to detect drift, and
      # the repo's `.npmrc` pins `auto-install-peers=true`. The strict
      # check still works without --frozen-lockfile: pnpm re-resolves
      # under strict peer rules and fails on any conflict.
      - name: Install with strict peers
        run: |
          pnpm install --strict-peer-dependencies
