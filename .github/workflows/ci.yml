name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

# Cancel older runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Doctrine + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Wave H4 — release CI gate. .npmrc still allows permissive
      # peer-dep resolution locally (auto-install-peers=true,
      # strict-peer-dependencies=false) so dev installs don't snag,
      # but every release-bound build re-resolves under strict mode
      # to catch peer drift before it ships.
      - name: Strict peer-dep resolution (release-CI gate)
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      - name: Doctrine checks (capability manifests, boundaries, exports, vocabulary firewall)
        run: pnpm check:all

      - name: Build packages first (apps import from packages' dist/, so build must precede typecheck)
        run: pnpm -r --filter './packages/*' build

      # H7-E.8 / EXT3-003 — public-API surface snapshot. Runs after
      # build so dist/*.d.ts exists; locks every exported symbol's
      # shape so silent breaking changes can't ship.
      - name: API surface snapshot (H7-E.8)
        run: pnpm check:api-surface

      - name: Typecheck all packages + apps
        run: pnpm -r typecheck

      - name: Unit tests (vitest)
        run: pnpm test:unit

      # H7-D.8 — per-package vitest coverage threshold. Conservative
      # baseline (50% lines / 60% branches at the root); per-package
      # configs may raise. Goal: ratchet up post-audit.
      - name: Vitest coverage floor (H7-D.8)
        run: pnpm -r --filter './packages/*' exec vitest run --coverage --reporter=default
        continue-on-error: false

      - name: Integration tests (per-package vitest)
        run: pnpm test:integration:packages

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contract dependencies (forge-std + account-abstraction + OZ)
        working-directory: packages/contracts
        run: bash setup.sh

      - name: Forge contract tests (test pyramid Layer 4)
        working-directory: packages/contracts
        run: forge test -vv

      # H7-E.2 — per-contract coverage floor. Ratchet-only gate: any
      # regression below the recorded debt floors fails CI. New contracts
      # default to tier floors (libraries 85%/75%, src 60%/35%).
      - name: Forge coverage floor (H7-E.2)
        run: pnpm check:forge-coverage
