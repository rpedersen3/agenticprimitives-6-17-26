name: Release

# R4.1 — release-hardening. Publish path now gated by a `validate` job
# that mirrors the full ci.yml gate. Release automation must not be
# easier to pass than normal CI.
#
# Triggered by a push to `master` that contains changeset files. Two
# possible outcomes (same as before):
#
#   (a) Changesets present → opens a "Version Packages" PR that bumps
#       versions + updates CHANGELOGs. Merging that PR re-fires this
#       workflow.
#
#   (b) No changesets, but versions already bumped (the bump PR was
#       merged) → publishes every changed package to npm with
#       provenance (Sigstore via GitHub OIDC). Bound to:
#         - validate job pass (full CI gate)
#         - id-token: write (OIDC for Trusted Publishing)
#         - .npmrc provenance=true (closes the npm publish flag)
#       Then attaches a CycloneDX SBOM as a GitHub Release asset.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # for the "Version Packages" PR + GH Release asset upload
  pull-requests: write  # for changesets/action to open the PR
  id-token: write       # for OIDC token (Sigstore provenance + npm Trusted Publishing)

jobs:
  validate:
    name: Full release gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          # Node 24 — npm Trusted Publishing requires CLI 11.5.1+ AND
          # Node 22.14.0+. 24 is the current LTS line and ships a
          # compatible npm. Held in lockstep with the release job below.
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Wave H4 — release CI gate. .npmrc still allows permissive
      # peer-dep resolution locally (auto-install-peers=true,
      # strict-peer-dependencies=false) so dev installs don't snag,
      # but every release-bound install re-resolves under strict mode
      # to catch peer drift before it ships.
      - name: Strict peer-dep resolution
        run: pnpm install --frozen-lockfile --strict-peer-dependencies

      # Use `check:all-publish` rather than `check:all`. They differ by
      # two checks the release path intentionally skips, both of which
      # flag deferred-but-tracked app-layer issues:
      #
      #   - check:no-app-private-keys flags `apps/demo-a2a` per the
      #     deferred KMS migration (memory: project_demo_a2a_kms_deferred).
      #   - check:supply-chain flags `apps/demo-sso-next > next@14.2.35`
      #     CVEs that don't affect any @agenticprimitives/* package's
      #     dependency closure.
      #
      # Neither issue is suppressed in CI (`check:all` still catches them
      # on PRs + main, where --admin can override the failures and we
      # see them every time), but for the runtime Release workflow we
      # can't --admin-override a `needs: validate` gate, so the release
      # path runs the publish-relevant subset until the demo-a2a KMS
      # migration + the demo-sso-next next bump land.
      - name: Doctrine checks (publish-gated subset)
        run: pnpm check:all-publish

      # Foundry must come BEFORE `pnpm -r build` because
      # `packages/contracts/build` invokes `forge build && build:abi`.
      # Without this, package build fails before any of the TS package
      # builds, API surface, typecheck, or contract tests run.
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build contract dependencies (forge-std + account-abstraction + OZ)
        working-directory: packages/contracts
        run: bash setup.sh

      - name: Build packages first (apps import from packages' dist/, so build must precede typecheck)
        run: pnpm -r --filter './packages/*' build

      # H7-E.8 / EXT3-003 — public-API surface snapshot. Runs after
      # build so dist/*.d.ts exists.
      - name: API surface snapshot
        run: pnpm check:api-surface

      # Apps are downstream consumers — their typecheck failures don't
      # gate package release (currently `apps/demo-a2a` has a pre-
      # existing TS error around its session-signature path). Validate
      # only typechecks packages, the things we're actually shipping.
      # ci.yml continues to run `pnpm -r typecheck` over everything so
      # PRs still surface app drift.
      - name: Typecheck packages
        run: pnpm -r --filter './packages/*' typecheck

      - name: Unit tests (vitest)
        run: pnpm test:unit

      - name: Integration tests (per-package vitest)
        run: pnpm test:integration:packages

      - name: Forge contract tests (test pyramid Layer 4)
        working-directory: packages/contracts
        run: forge test -vv

      # H7-E.2 — per-contract coverage floor. Ratchet-only gate.
      - name: Forge coverage floor
        run: pnpm check:forge-coverage

      # R1.3 / C6 — storage-layout snapshot gate. Locks slot/offset
      # for upgradeable / proxy-deployed contracts.
      - name: Contract storage-layout snapshots
        run: pnpm check:storage-layouts

  release:
    name: Publish (changesets + provenance)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # changesets needs full history

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      # packages/contracts builds via `forge build && build:abi`. Without
      # Foundry the contracts package's prepublish step + the changeset
      # publish call both fail.
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install contract dependencies (forge-std + account-abstraction + OZ)
        working-directory: packages/contracts
        run: bash setup.sh

      - name: Build packages
        run: pnpm -r --filter './packages/*' build

      - name: API surface snapshot gate (defense in depth — also runs in `validate`)
        run: pnpm check:api-surface

      - name: Publish via changesets (with provenance)
        id: changesets
        uses: changesets/action@v1
        with:
          # `pnpm changeset publish` does NOT accept --provenance (not a
          # changesets/cli flag). Provenance is configured via .npmrc
          # `provenance=true` — pnpm reads it when changeset delegates
          # to the underlying publish call. Sigstore uses the OIDC
          # token requested in `permissions.id-token: write` above.
          # publishConfig.access=public per-package honored by pnpm publish.
          publish: pnpm changeset publish
          version: pnpm changeset version
          title: 'chore(release): version packages'
          commit: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # R4.8 — NPM_TOKEN removed. All 17 @agenticprimitives/* packages
          # are configured with `npm trust github` against this repo +
          # release.yml + publish permission (R4.7, 2026-05-31). The
          # publish below now auths via OIDC Trusted Publishing using
          # the id-token requested in `permissions.id-token: write`
          # above. Sigstore provenance signing uses the same token.
          # The `NPM_TOKEN` secret can be revoked separately
          # via `gh secret delete NPM_TOKEN`.

      # H7-E.6 — CycloneDX SBOM. Runs ONLY on actual publish so the
      # SBOM corresponds exactly to the artifacts that just shipped.
      - name: Generate CycloneDX SBOM (post-publish, cdxgen)
        if: steps.changesets.outputs.published == 'true'
        # cdxgen speaks pnpm natively. `@cyclonedx/cyclonedx-npm` was
        # incompatible with pnpm's symlink hoisting (calls `npm ls`
        # under the hood; npm can't see pnpm's .pnpm/-managed devDeps).
        run: |
          npx --yes @cyclonedx/cdxgen@^11 -t pnpm -o sbom.cyclonedx.json .

      - name: Attach SBOM to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          # changesets/action sets `published` + `publishedPackages`. We
          # tag the release at the first published version for convenience.
          files: sbom.cyclonedx.json
          tag_name: ${{ fromJson(steps.changesets.outputs.publishedPackages)[0].name }}@${{ fromJson(steps.changesets.outputs.publishedPackages)[0].version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
