# H7-E (post-push): gitleaks allowlist for repo-specific false positives.
#
# Every entry below has been INDIVIDUALLY verified as a test fixture,
# generated synthetic value, or syntactic match — NOT a real secret.
# When adding a new entry: include the file + path + a one-line rationale.
#
# To run locally:
#   gitleaks detect --source . --verbose --redact --exit-code 1

title = "agenticprimitives gitleaks config"

[extend]
# Inherit the upstream default rule set.
useDefault = true

[allowlist]
description = "Path + commit allowlist — verified false positives only."

paths = [
  # Snapshot-style inline JSON of fake delegation tokens (zero-padded
  # signatures, deterministic fake addresses + jti). Gitleaks reads
  # the long inline-snapshot hex blob as a high-entropy secret.
  '''packages/delegation/test/unit/canonical-json\.test\.ts$''',

  # GCP service-account JSON FIXTURES that GENERATE a synthetic RSA
  # private key at runtime via @noble/curves; the PEM string never
  # touches disk. The file shows the PEM-builder loop, not a key.
  '''packages/key-custody/test/unit/gcp-provider\.test\.ts$''',
  '''packages/key-custody/test/unit/gcp-signer\.test\.ts$''',

  # Pure TypeScript interface field declarations (e.g.
  # `shapeRegistry?: string;`). Gitleaks mis-reads identifier-strings
  # as high-entropy generic API keys.
  '''scripts/gen-dev-vars\.ts$''',

  # `fullyParallel: false` — Playwright config syntax token; the
  # alphanumeric / colon / underscore mix trips the generic-api-key
  # entropy heuristic.
  '''tests/e2e/playwright\.config\.ts$''',

  # GCP provisioning key-map test FIXTURE. The current source uses a benign
  # placeholder string for `private_key`, but an earlier commit (617cdc8) carried
  # a literal `-----BEGIN PRIVATE KEY-----\nabc\n...` placeholder that history
  # scanning still flags. Synthetic fixture, never a real key (same rationale as
  # the sibling gcp-provider / gcp-signer fixtures above).
  '''packages/key-custody/test/unit/provision-gcp\.test\.ts$''',

  # Changeset prose: a backtick-quoted identifier
  # (`Eip712Signature2026Proof.delegatingSigner`) trips the generic-api-key
  # entropy heuristic. Documentation, not a secret. (File already consumed; only
  # present in release history.)
  '''\.changeset/content-trust-delegated-signing\.md$''',
]
